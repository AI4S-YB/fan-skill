# Genome assembly decision matrix test cases
# Each rule has at least one triggering case

test_cases:
  # --- Assembler ---
  - name: "assembler_pacbio_hifi"
    rule_section: assembler
    input_profile:
      sequencing_type: "pacbio_hifi"
    expected:
      rule_id: "asm-hifiasm-hifi-001"
      recommend: "hifiasm"

  - name: "assembler_ont"
    rule_section: assembler
    input_profile:
      sequencing_type: "ont"
    expected:
      rule_id: "asm-flye-ont-002"
      recommend: "flye"

  - name: "assembler_hybrid"
    rule_section: assembler
    input_profile:
      has_short_reads: true
      has_long_reads: true
    expected:
      rule_id: "asm-hybrid-003"
      recommend: "hybrid_assembly"

  - name: "assembler_pacbio_hifi_large_genome"
    rule_section: assembler
    input_profile:
      sequencing_type: "pacbio_hifi"
      genome_size_mb: 2500
    expected:
      rule_id: "asm-hifiasm-hifi-001"
      recommend: "hifiasm"

  # --- Polishing ---
  - name: "polishing_ont_medaka"
    rule_section: polishing
    input_profile:
      sequencing_type: "ont"
    expected:
      rule_id: "pol-medaka-ont-001"
      recommend: "medaka"

  - name: "polishing_pacbio_hifi_gcpp"
    rule_section: polishing
    input_profile:
      sequencing_type: "pacbio_hifi"
    expected:
      rule_id: "pol-gcpp-hifi-002"
      recommend: "gcpp"

  # --- QC ---
  - name: "qc_busco_merqury_standard"
    rule_section: qc
    input_profile:
      assembly_type: "draft"
    expected:
      rule_id: "qc-busco-merqury-001"
      recommend: "busco_and_merqury"

  - name: "qc_busco_merqury_final"
    rule_section: qc
    input_profile:
      assembly_type: "chromosome_level"
    expected:
      rule_id: "qc-busco-merqury-001"
      recommend: "busco_and_merqury"

  # --- Scaffolding ---
  - name: "scaffolding_with_hic"
    rule_section: scaffolding
    input_profile:
      has_hic_data: true
    expected:
      rule_id: "scaf-hic-001"
      recommend: "yahs_or_salsa_hic"

  - name: "scaffolding_hic_plant"
    rule_section: scaffolding
    input_profile:
      has_hic_data: true
      species: "wheat"
    expected:
      rule_id: "scaf-hic-001"
      recommend: "yahs_or_salsa_hic"

  # --- Fallback ---
  - name: "fallback_no_rules_match"
    rule_section: fallback
    input_profile: {}
    expected:
      rule_id: "asm-fallback-999"
      action: "delegate_to_expert"
