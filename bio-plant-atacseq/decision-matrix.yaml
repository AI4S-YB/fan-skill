version: "1.0"
analysis: atacseq
peak_calling:
  - rule_id: "atac-macs2-standard-001"
    priority: 10
    recommend: "macs2_atac_mode"
    reason: "ATAC-seq -> MACS2 --nomodel --shift -100 --extsize 200"
    tool: "tool-catalog/peak-calling.md"
diff_accessibility:
  - rule_id: "atac-diffbind-001"
    priority: 10
    condition: { rep_count: ">= 2" }
    recommend: "diffbind_deseq2"
    reason: ">=2 copies -> DiffBind+DESeq2 differential accessibility"
    tool: "tool-catalog/diff-accessibility.md"
footprinting:
  - rule_id: "atac-tobias-001"
    priority: 5
    recommend: "tobias_footprinting"
    reason: "TOBIAS TF footprinting analysis"
    tool: "tool-catalog/footprinting.md"
fallback:
  - rule_id: "atac-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
