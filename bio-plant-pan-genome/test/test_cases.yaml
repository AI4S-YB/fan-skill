test_cases:
  - name: "small_genome_count_minigraph"
    rule_section: graph_construction
    input_profile:
      genome_count: 10
    expected:
      rule_id: "pan-minigraph-small-001"

  - name: "large_genome_count_pggb"
    rule_section: graph_construction
    input_profile:
      genome_count: 25
    expected:
      rule_id: "pan-pggb-large-002"

  - name: "complex_with_haplotypes_cactus"
    rule_section: graph_construction
    input_profile:
      genome_count: 30
      has_haplotypes: true
    expected:
      rule_id: "pan-cactus-complex-003"

  - name: "core_gene_classification"
    rule_section: core_variable
    input_profile: {}
    expected:
      rule_id: "pan-core-threshold-001"

  - name: "core_with_orthogroups"
    rule_section: core_variable
    input_profile:
      has_orthogroups: true
    expected:
      rule_id: "pan-core-orthofinder-002"

  - name: "pav_default_pangene"
    rule_section: pav_detection
    input_profile: {}
    expected:
      rule_id: "pan-pav-pangene-001"

  - name: "pav_with_graph"
    rule_section: pav_detection
    input_profile:
      has_graph: true
    expected:
      rule_id: "pan-pav-svgap-002"

  - name: "sv_genotyping_default"
