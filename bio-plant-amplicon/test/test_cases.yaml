# 扩增子测序 决策矩阵测试用例
# 每条 rule 至少一个 case 能触发

test_cases:
  # --- 去噪 ---
  - name: "denoising_dada2_default"
    rule_section: denoising
    input_profile: {}
    expected:
      rule_id: "amp-dada2-001"
      recommend: "dada2"

  - name: "denoising_deblur_alternative"
    rule_section: denoising
    input_profile:
      read_length: "fixed"
    expected:
      rule_id: "amp-dada2-001"
      recommend: "dada2"

  # --- 分类学注释：16S ---
  - name: "taxonomy_16s_silva"
    rule_section: taxonomy
    input_profile:
      target: "16S"
    expected:
      rule_id: "amp-silva-16s-001"
      recommend: "silva_138"

  - name: "taxonomy_16s_v4_region"
    rule_section: taxonomy
    input_profile:
      target: "16S"
    expected:
      rule_id: "amp-silva-16s-001"
      recommend: "silva_138"

  # --- 分类学注释：ITS ---
  - name: "taxonomy_its_unite"
    rule_section: taxonomy
    input_profile:
      target: "ITS"
    expected:
      rule_id: "amp-unite-its-002"
      recommend: "unite"

  - name: "taxonomy_its_fungi"
    rule_section: taxonomy
    input_profile:
      target: "ITS"
    expected:
      rule_id: "amp-unite-its-002"
      recommend: "unite"

  # --- 多样性 ---
  - name: "diversity_core_metrics"
    rule_section: diversity
    input_profile: {}
    expected:
      rule_id: "amp-core-metrics-001"
      recommend: "core_diversity_metrics"

  # --- 差异丰度 ---
  - name: "diff_abundance_ancom_bc_two_groups"
    rule_section: diff_abundance
    input_profile:
      group_count: 2
    expected:
      rule_id: "amp-ancom-001"
      recommend: "ancom_bc"

  - name: "diff_abundance_ancom_bc_multi_groups"
    rule_section: diff_abundance
    input_profile:
      group_count: 5
    expected:
      rule_id: "amp-ancom-001"
      recommend: "ancom_bc"

  # --- fallback ---
  - name: "no_marker_match_fallback"
    rule_section: taxonomy
    input_profile:
      target: "18S"
    expected:
      rule_id: "amp-fallback-999"
      action: "delegate_to_expert"
