version: "1.0"
analysis: dna_methylation
alignment:
  - rule_id: "meth-bismark-wgbs-001"
    priority: 10
    condition: { protocol: "wgbs" }
    recommend: "bismark_wgbs"
    reason: "WGBS -> Bismark alignment + methylation extraction"
    tool: "tool-catalog/bismark.md"
  - rule_id: "meth-bismark-rrbs-002"
    priority: 10
    condition: { protocol: "rrbs" }
    recommend: "bismark_rrbs"
    reason: "RRBS -> Bismark RRBS mode"
dmr_calling:
  - rule_id: "dmr-dss-001"
    priority: 10
    condition: { rep_count: ">= 2" }
    recommend: "dss_dmr"
    reason: ">=2 copies -> DSS DMR detection"
    tool: "tool-catalog/dmr-calling.md"
correlation:
  - rule_id: "meth-expr-correlation-001"
    priority: 5
    condition: { has_expression_data: true }
    recommend: "methylation_expression_correlation"
    reason: "Has expression data -> methylation-expression correlation analysis"
fallback:
  - rule_id: "meth-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
