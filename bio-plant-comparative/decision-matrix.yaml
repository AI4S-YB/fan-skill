version: "1.0"
analysis: comparative_genomics

inputs_required:
  - data_profile.json
  - genome_sequences
  - gff_annotation
  - params.yaml

synteny_analysis:
  - rule_id: "syn-intraspecies-001"
    priority: 10
    condition:
      comparison_type: "intraspecies"
    recommend: "mcsanx_self"
    reason: "种内共线性 → MCScanX 自比对，识别基因组加倍事件"
    tool: "tool-catalog/mcsanx.md"

  - rule_id: "syn-interspecies-002"
    priority: 10
    condition:
      comparison_type: "interspecies"
    recommend: "mcsanx_pairwise"
    reason: "种间共线性 → MCScanX 双向比对"
    tool: "tool-catalog/mcsanx.md"

  - rule_id: "syn-multi-species-003"
    priority: 9
    condition:
      species_count: ">= 3"
    recommend: "jcvi_mcscan_python"
    reason: "≥3 物种用 JCVI 版本的 MCScan (Python) 更方便多物种比较"
    tool: "tool-catalog/mcsanx.md"

  - rule_id: "syn-polyploid-004"
    priority: 10
    condition:
      ploidy: ["allopolyploid", "autopolyploid"]
    recommend: "mcsanx_subgenome_aware"
    reason: "多倍体 → 亚基因组感知的共线性分析"
    tool: "tool-catalog/mcsanx.md"

ks_analysis:
  - rule_id: "ks-whole-genome-duplication-001"
    priority: 10
    condition:
      analysis_goal: "wgd_dating"
    recommend: "wgdi_ks_peak"
    reason: "全基因组加倍时间估计 → WGDI 或 KaKs_Calculator 的峰值拟合"
    tool: "tool-catalog/ks-analysis.md"

  - rule_id: "ks-gene-pair-002"
    priority: 8
    condition:
      analysis_goal: "gene_pair_age"
    recommend: "kaks_calculator_yn00"
    reason: "单对基因的 Ks → KaKs_Calculator yn00 方法"
    tool: "tool-catalog/ks-analysis.md"

  - rule_id: "ks-large-scale-003"
    priority: 7
    condition:
      gene_pair_count: ">= 1000"
    recommend: "paml_codeml_batch"
    reason: "大量基因对 → PAML codeml 批量模式"
    tool: "tool-catalog/ks-analysis.md"

gene_family:
  - rule_id: "gf-orthofinder-standard-001"
    priority: 10
    condition:
      species_count: ">= 2"
    recommend: "orthofinder"
    reason: "多物种基因家族 → OrthoFinder 是金标准"
    tool: "tool-catalog/orthofinder.md"

  - rule_id: "gf-single-species-hmm-002"
    priority: 8
    condition:
      species_count: "== 1"
      domain_known: true
    recommend: "hmm_search"
    reason: "单物种已知结构域家族 → HMMER hmmsearch"
    tool: "tool-catalog/gene-family.md"

  - rule_id: "gf-single-species-blast-003"
    priority: 7
    condition:
      species_count: "== 1"
      domain_known: false
    recommend: "blast_all_vs_all_cluster"
    reason: "单物种未知结构域 → BLAST all-vs-all + MCL 聚类"
    tool: "tool-catalog/gene-family.md"

  - rule_id: "gf-nbs-lrr-plant-004"
    priority: 9
    condition:
      family_type: "nbs_lrr"
    recommend: "nbs_lrr_specific_pipeline"
    reason: "植物 NBS-LRR 抗病基因家族 → 专用 pipeline (NLR-Annotator/RGAugury)"
    tool: "tool-catalog/gene-family.md"

selection_pressure:
  - rule_id: "sel-branch-site-001"
    priority: 10
    condition:
      analysis_type: "positive_selection_branch"
    recommend: "paml_branch_site_model"
    reason: "检测特定支系的正选择 → PAML branch-site model (Model A vs null)"
    tool: "tool-catalog/selection-pressure.md"

  - rule_id: "sel-site-model-002"
    priority: 9
    condition:
      analysis_type: "positive_selection_sites"
    recommend: "paml_site_model"
    reason: "检测全基因范围内的正选择位点 → PAML site model (M7 vs M8)"
    tool: "tool-catalog/selection-pressure.md"

  - rule_id: "sel-branch-model-003"
    priority: 8
    condition:
      analysis_type: "divergent_selection"
    recommend: "paml_branch_model"
    reason: "检测支系间选择压力差异 → PAML branch model (free-ratio)"
    tool: "tool-catalog/selection-pressure.md"

tree_reconciliation:
  - rule_id: "tree-species-tree-001"
    priority: 5
    condition:
      has_reference_tree: true
    recommend: "use_reference_species_tree"
    reason: "有参考物种树时优先使用"

  - rule_id: "tree-infer-from-single-copy-002"
    priority: 5
    condition:
      has_reference_tree: false
    recommend: "infer_from_single_copy_orthologs"
    reason: "从单拷贝直系同源基因推断物种树"

fallback:
  - rule_id: "comp-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
