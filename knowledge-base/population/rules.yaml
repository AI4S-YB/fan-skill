name: population
description: "Plant population genetics — PCA, ADMIXTURE, Fst, phylogenetic trees. Characterize genetic structure, detect subpopulations, and quantify differentiation. Dual-mode decision system."
triggers:
  - "population structure"
  - "pca"
  - "genetic diversity"
  - "admixture"
  - "fst"
  - "phylogeny"
  - "kinship"
  - "population genetics"

inputs:
  - data_profile.json
  - genotype_data
  - species_info
  - params.yaml

outputs:
  - pca_plot
  - phylogenetic_tree
  - structure_plot
  - fst_table
  - analysis_report

version: "1.0"
analysis: population_genetics

inputs_required:
  - data_profile.json
  - params.yaml

# LD pruning strategy
ld_pruning:
  - rule_id: "ld-standard-001"
    priority: 5
    condition:
      snp_count: ">= 10000"
    action: "standard_ld_prune"
    params: {window: 50, step: 5, r2: 0.2}
    reason: "标准 LD pruning 参数"

  - rule_id: "ld-relaxed-002"
    priority: 5
    condition:
      snp_count: "< 10000"
    action: "relaxed_ld_prune"
    params: {window: 50, step: 10, r2: 0.5}
    reason: "标记少时放宽 r² 阈值，保留更多 SNP"

# K range selection for ADMIXTURE
k_range:
  - rule_id: "k-large-dataset-001"
    priority: 5
    condition:
      sample_count: ">= 100"
    recommend: "K=1 to 15"
    params: {k_min: 1, k_max: 15, cv_folds: 10, max_iter: 500, tolerance: 1e-6, random_seed: 42, n_bootstrap: 100}
    reason: "大样本可能需要更多祖先成分"

  - rule_id: "k-small-dataset-002"
    priority: 5
    condition:
      sample_count: "< 100"
    recommend: "K=1 to 8"
    params: {k_min: 1, k_max: 8, cv_folds: 5, max_iter: 200, tolerance: 1e-5, random_seed: 42, n_bootstrap: 50}
    reason: "小样本限定 K 上限避免过拟合"

# Population structure interpretation
structure_interpretation:
  - rule_id: "struct-strong-001"
    priority: 5
    condition:
      pc1_variance: ">= 0.15"
    interpretation: "strong_discrete_structure"
    params: {n_pcs: 10, clustering_method: "kmeans", min_cluster_size: 5, silhouette_threshold: 0.5, visualization_type: "discrete"}
    reason: "PC1 > 15% → 明显的离散亚群"

  - rule_id: "struct-moderate-002"
    priority: 5
    condition:
      pc1_variance: ">= 0.05"
    interpretation: "moderate_structure"
    params: {n_pcs: 15, clustering_method: "hierarchical", linkage: "ward", min_cluster_size: 3, silhouette_threshold: 0.3, visualization_type: "gradient"}
    reason: "PC1 5-15% → 适度的群体结构"

  - rule_id: "struct-weak-003"
    priority: 5
    condition:
      pc1_variance: "< 0.05"
    interpretation: "weak_continuous_structure"
    params: {n_pcs: 20, clustering_method: "gaussian_mixture", n_components: 3, covariance_type: "full", visualization_type: "continuous", use_spatial_coords: true}
    reason: "PC1 < 5% → 无明显群体分化或沿连续梯度分布"

  - rule_id: "struct-polyploid-004"
    priority: 6
    condition:
      ploidy: ["allopolyploid", "autopolyploid"]
    interpretation: "caution_polyploid"
    params: {n_pcs: 15, allele_dosage_correction: true, autopolyploid_mode: false, use_polyploid_pca: true, minor_allele_freq_threshold: 0.01, genotype_likelihood_method: "freebayes"}
    reason: "多倍体物种的 PCA 解释需谨慎"

# Fst interpretation
fst_interpretation:
  - rule_id: "fst-very-great-001"
    priority: 5
    condition:
      fst_value: ">= 0.25"
    interpretation: "very_great_differentiation"
    params: {fst_window_size: 100000, fst_step_size: 10000, min_snps_per_window: 10, outlier_percentile: 99, bootstrap_replicates: 1000, confidence_level: 0.95}

  - rule_id: "fst-great-002"
    priority: 5
    condition:
      fst_value: ">= 0.15"
    interpretation: "great_differentiation"
    params: {fst_window_size: 50000, fst_step_size: 5000, min_snps_per_window: 15, outlier_percentile: 97.5, bootstrap_replicates: 500, confidence_level: 0.95}

  - rule_id: "fst-moderate-003"
    priority: 5
    condition:
      fst_value: ">= 0.05"
    interpretation: "moderate_differentiation"
    params: {fst_window_size: 25000, fst_step_size: 2500, min_snps_per_window: 20, outlier_percentile: 95, bootstrap_replicates: 500, confidence_level: 0.95}

  - rule_id: "fst-low-004"
    priority: 5
    condition:
      fst_value: "< 0.05"
    interpretation: "low_differentiation"
    params: {fst_window_size: 10000, fst_step_size: 1000, min_snps_per_window: 30, outlier_percentile: 90, bootstrap_replicates: 1000, confidence_level: 0.99, use_hudson_estimator: true}

# Fallback
fallback:
  - rule_id: "popgen-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params: {reason: "no_matching_rule"}

design_gates:
  - id: "pop-sampling-adequate"
    rule: "群体遗传分析需要足够的个体数来代表群体的多样性"
    check: "sample_count >= 20"
    severity: "warn"
    on_fail: "样本量 < 20 → 群体结构推断可能不稳定（ADMIXTURE 的 cross-validation error 波动大），等位基因频率谱的代表性不足。对于 PCA，< 20 个体可能产生不可靠的主成分。"
  - id: "pop-marker-coverage"
    rule: "群体遗传分析需要全基因组分布的标记"
    check: "snp_count >= 1000"
    severity: "warn"
    on_fail: "标记数 < 1000 → 全基因组代表性不足。Fst 扫描和选择性清除分析的分辨率低。PCA 仍然可行（少量标记也能反映群体结构），但精确定量的能力受限。"
  - id: "pop-outgroup"
    rule: "系统发育分析和 D 统计量 (ABBA-BABA) 需要外群"
    check: "has_outgroup == true or analysis_type not in ['phylogeny', 'introgression']"
    severity: "block"
    on_fail: "没有外群 → 无法确定 ancestral state。NJ/ML 树可以构建但根无法确定。D 统计量 (ABBA-BABA) 必须指定外群来推断 ancestral allele。"
