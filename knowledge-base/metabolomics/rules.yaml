name: metabolomics
description: "Plant metabolomics analysis — from LC-MS/GC-MS peak detection to differential metabolite analysis and pathway mapping. Covers XCMS, MZmine, limma, SIRIUS+CSI:FingerID, and PlantCyc/KEGG pathway enrichment. Uses a dual-mode decision system (rule matrix + expert notebook)."
triggers:
  - "metabolomics"
  - "metabolite"
  - "lc-ms"
  - "gc-ms"
  - "nmr"
  - "metabolite identification"
  - "xcms"
  - "metaboanalyst"

inputs:
  - mass_spectrometry_data
  - metadata.csv
  - reference_database

outputs:
  - analysis_report
  - figures
  - result_tables

version: "1.0"
analysis: metabolomics

peak_detection:
  - rule_id: "metab-xcms-lc-001"
    priority: 10
    condition: { platform: "lc_ms" }
    recommend: "xcms"
    reason: "LC-MS → XCMS峰检测和对齐"
    tool_id: "peak-detection"
  - rule_id: "metab-mzmine-gc-002"
    priority: 10
    condition: { platform: "gc_ms" }
    recommend: "mzmine"
    reason: "GC-MS → MZmine更适合"

diff_analysis:
  - rule_id: "metab-limma-001"
    priority: 10
    condition: { rep_count: ">= 3" }
    recommend: "limma_diff_metabolites"
    reason: "≥3重复 → limma差异代谢物"

pathway_mapping:
  - rule_id: "metab-plantcyc-001"
    priority: 10
    recommend: "plantcyc_and_kegg_plant"
    reason: "植物代谢通路 → PlantCyc + KEGG Plant"
    tool_id: "pathway"

annotation:
  - rule_id: "metab-ms2-sirius-001"
    priority: 5
    condition: { has_ms2: true }
    recommend: "sirius_csi_fingerid"
    reason: "有MS/MS → SIRIUS+CSI:FingerID结构鉴定"

fallback:
  - rule_id: "metab-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
