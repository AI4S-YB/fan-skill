name: time-series
description: "Plant time-series expression analysis — from DESeq2-normalized counts through smoothing, clustering, and stage-specificity to publication-ready visualizations. Uses a dual-mode decision system (rule matrix + expert notebook)."
triggers:
  - "time series"
  - "time course"
  - "temporal"
  - "longitudinal"
  - "developmental"
  - "trajectory"
  - "pseudotime"
  - "maSigPro"

inputs:
  - data_profile.json
  - params.yaml
  - normalized_expression_matrix
  - time_point_metadata

outputs:
  - cluster_assignments
  - trend_patterns_table
  - stage_specificity_table
  - analysis_report

version: "1.0"
analysis: time_series_expression

inputs_required:
  - data_profile.json
  - params.yaml
  - normalized_expression_matrix  # DESeq2 VST/rlog
  - time_point_metadata

# ============================================================
# Decision node 1: Preprocessing / Smoothing
# ============================================================
preprocessing:
  - rule_id: "ts-preprocess-standard-001"
    priority: 5
    condition:
      time_points: ">= 5"
    recommend: "spline_smoothing"
    reason: "≥5 time points -> spline smoothing for denoising with preserved inflection points"
    tool_id: "preprocessing"
    params:
      smoothing_method: "spline"
      df: 4
      preserve_inflection: true
      interpolate_missing: true

  - rule_id: "ts-preprocess-few-points-002"
    priority: 5
    condition:
      time_points: "< 5"
    recommend: "loess_smoothing"
    reason: "<5 time points -> LOESS more robust with fewer data points; spline overfits"
    params:
      smoothing_method: "loess"
      span: 0.75
      degree: 2
      robust: true

# ============================================================
# Decision node 2: Clustering
# ============================================================
clustering:
  - rule_id: "ts-mfuzz-standard-001"
    priority: 10
    condition:
      gene_count: ">= 1000"
    recommend: "mfuzz"
    reason: "≥1000 genes -> Mfuzz soft clustering allows genes to belong to multiple patterns, better for complex plant transcriptomes"
    tool_id: "mfuzz"
    params:
      min_cluster: 4
      max_cluster: 16
      m: 1.25

  - rule_id: "ts-kmeans-few-002"
    priority: 8
    condition:
      gene_count: "< 1000"
    recommend: "kmeans"
    reason: "<1000 genes -> k-means simple and effective for smaller gene sets"
    tool_id: "kmeans-cluster"
    params:
      k_range:
        min: 2
        max: 10
      nstart: 25
      algorithm: "Hartigan-Wong"
      iter_max: 100

# ============================================================
# Decision node 3: Stage / Tissue Specificity
# ============================================================
stage_specificity:
  - rule_id: "ts-tau-index-001"
    priority: 5
    condition:
      tissue_or_stage_count: ">= 3"
    recommend: "tau_index"
    reason: "≥3 tissues/stages -> tau index quantifies expression specificity across conditions"
    tool_id: "stage-specificity"
    params:
      threshold: 0.8

# ============================================================
# Decision node 4: Trend Analysis
# ============================================================
trend_analysis:
  - rule_id: "ts-trend-stem-001"
    priority: 5
    condition:
      time_points: ">= 6"
    recommend: "stem"
    reason: "≥6 time points -> STEM identifies statistically significant temporal trend profiles"
    tool_id: "trend-analysis"
    params:
      max_profiles: 50
      significance_threshold: 0.05
      correction_method: "FDR"
      min_genes_per_profile: 10

  - rule_id: "ts-trend-mfuzz-pattern-002"
    priority: 4
    condition:
      time_points: "< 6"
    recommend: "mfuzz_trend"
    reason: "<6 time points -> Mfuzz cluster profiles suffice for trend interpretation"
    tool_id: "trend-analysis"
    params:
      min_cluster: 4
      max_cluster: 12
      m: 1.25
      membership_threshold: 0.5

# ============================================================
# Decision node 5: Visualization
# ============================================================
visualization:
  - rule_id: "ts-viz-heatmap-line-001"
    priority: 5
    condition:
      time_points: ">= 5"
    recommend: "heatmap_plus_line"
    reason: "≥5 time points -> combined heatmap and line plots capture global and per-gene patterns"
    tool_id: "visualization"
    params:
      plot_type: "combined"
      heatmap_cluster_rows: true
      heatmap_cluster_cols: false
      line_plot_ci: true
      color_palette: "viridis"
      show_time_labels: true

  - rule_id: "ts-viz-simple-line-002"
    priority: 5
    condition:
      time_points: "< 5"
    recommend: "simple_line_plot"
    reason: "<5 time points -> simple line plot with error bars most interpretable"
    tool_id: "visualization"
    params:
      plot_type: "line"
      show_error_bars: true
      error_type: "se"
      point_size: 3
      line_width: 1.5
      show_time_labels: true

# ============================================================
# Global Fallback
# ============================================================
fallback:
  - rule_id: "ts-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    reason: "Data characteristics outside preset rules, switch to expert reasoning"
    params:
      reason: "no_matching_rule"

design_gates:
  - id: "ts-time-points-minimum"
    rule: "时间序列分析至少需要 3 个时间点"
    check: "time_points >= 3"
    severity: "block"
    on_fail: "< 3 个时间点 → 无法做时间序列分析。两个时间点的比较是差异表达分析，不是时间序列。至少需要 3 个时间点才能做趋势分析或聚类。"
  - id: "ts-replicates-per-time"
    rule: "每个时间点需要生物学重复（至少 2 个用于方差估计）"
    check: "replicates_per_time_point >= 2"
    severity: "warn"
    on_fail: "每个时间点仅 1 个样本 → 无法估计各时间点内的表达变异，不能做统计推断。可以做探索性趋势描述（平均值曲线），但不能评估趋势的统计显著性。"
  - id: "ts-sampling-interval"
    rule: "采样间隔应适合生物学过程的时间尺度"
    check: "sampling_interval_appropriate == true"
    severity: "warn"
    on_fail: "采样间隔不当 → 可能错过关键时间窗口。转录胁迫响应峰通常在 2-4h，如果间隔 > 4h 可能完全错过峰值。昼夜节律分析需要 ≤ 4h 间隔。"
  - id: "ts-circadian-confounding"
    rule: "植物时间序列必须考虑昼夜节律的混杂效应"
    check: "circadian_accounted == true"
    severity: "warn"
    on_fail: "未考虑昼夜节律 → 30-50% 的植物基因有昼夜节律振荡。如果处理组和对照组在不同 Zeitgeber time 取样，差异可能是节律效应而非处理效应。始终按 ZT 匹配对照和处理样本。"
