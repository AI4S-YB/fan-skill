name: grn
description: "Plant gene regulatory network inference — from expression matrix to TF annotation, network reconstruction (GENIE3/SCENIC), hub gene detection, module analysis, and visualization. Tailored for plant-specific TF families, polyploid homeolog handling, and non-model species strategies."
triggers:
  - "gene regulatory network"
  - "grn"
  - "co-expression"
  - "wgcna"
  - "transcription factor"
  - "target gene"
  - "regulome"
  - "genie3"

inputs:
  - expression_matrix
  - tf_list
  - reference_genome

outputs:
  - regulatory_network
  - hub_gene_table
  - regulon_activity_table
  - analysis_report

version: "1.0"
analysis: gene_regulatory_network

inference_method:
  - rule_id: "grn-genie3-standard-001"
    priority: 10
    condition:
      sample_count: ">= 15"
      tf_annotation: true
    recommend: "genie3_with_tf_prior"
    reason: ">=15 samples + TF annotation -> GENIE3 directed network inference"
    tool_id: "genie3"
    params:
      nTrees: 1000
      regulators: "{tf_list}"
      nCores: 4
  - rule_id: "grn-scenic-002"
    priority: 9
    condition:
      sample_count: ">= 20"
      tf_annotation: true
    recommend: "scenic"
    reason: ">=20 samples -> SCENIC can detect regulon activity"
    tool_id: "scenic"
    params:
      min_genes_per_regulon: 10
      auc_threshold: 0.05
      nes_threshold: 3
  - rule_id: "grn-wgcna-undirected-003"
    priority: 7
    tool_id: "wgcna"
    condition:
      tf_annotation: false
    recommend: "wgcna_coexpression"
    reason: "No TF annotation -> WGCNA undirected co-expression network"
    params:
      minModuleSize: 30
      mergeCutHeight: 0.25
      power: "auto"

tf_database:
  - rule_id: "tf-planttfdb-001"
    priority: 10
    condition:
      species_detected: ["oryza_sativa", "zea_mays", "arabidopsis_thaliana", "glycine_max", "solanum_lycopersicum"]
    recommend: "planttfdb"
    reason: "Major crop species -> PlantTFDB has complete annotation"
    params:
      database: "PlantTFDB"
      version: "5.0"
      tf_families: ["AP2/ERF", "bHLH", "bZIP", "MYB", "NAC", "WRKY", "MADS", "C2H2"]
      confidence_threshold: "high"
      include_domains: true
  - rule_id: "tf-homolog-infer-002"
    priority: 7
    condition:
      species_detected: "unknown"
    recommend: "homolog_inference"
    reason: "Non-model species -> infer TFs from Arabidopsis homologs"
    params:
      reference_species: "arabidopsis_thaliana"
      method: "blastp_reciprocal_best_hit"
      evalue_cutoff: 1e-5
      identity_threshold: 0.4
      coverage_threshold: 0.5
      tf_database: "PlantTFDB"
      min_confidence: "medium"

network_analysis:
  - rule_id: "na-hub-detection-001"
    priority: 5
    action: "degree_centrality_and_betweenness"
    reason: "Degree and betweenness centrality identify hub genes"
    params:
      metrics: ["degree", "betweenness", "closeness", "eigenvector"]
      hub_threshold: 0.95
      degree_percentile: 95
      betweenness_percentile: 95
      min_connections: 10
      output_format: "ranked_table"
  - rule_id: "na-module-002"
    priority: 6
    condition:
      network_size: ">= 500"
    recommend: "community_detection"
    reason: ">=500 nodes -> community detection identifies functional modules"
    params:
      algorithm: "louvain"
      resolution: 1.0
      min_module_size: 10
      modularity_threshold: 0.3
      edge_weight: "importance_score"
      output_modules: true

fallback:
  - rule_id: "grn-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params:
      reason: "no_matching_rule"
      fallback_action: "manual_analysis"
      suggest_tools: ["GENIE3", "WGCNA", "SCENIC"]
      expert_mode: true

design_gates:
  - id: "grn-expression-data"
    rule: "基因调控网络推断需要表达矩阵（至少 15 个样本）"
    check: "has_expression_matrix == true"
    severity: "block"
    on_fail: "没有表达矩阵 → 无法构建基因调控网络。需要多个样本/条件的表达量数据来估计基因间的共表达关系。样本数 < 15 时相关性估计极不稳定。"
  - id: "grn-sample-diversity"
    rule: "表达数据应包括多种条件/处理/扰动以充分探索调控关系"
    check: "condition_count >= 2"
    severity: "warn"
    on_fail: "单一条件/组织 → 只能推断该条件下活跃的调控关系，大量的条件特异性调控会被遗漏。建议至少包含 2-3 种不同的处理或发育阶段。"
  - id: "grn-tf-annotation"
    rule: "定向网络推断需要转录因子注释"
    check: "has_tf_annotation == true"
    severity: "warn"
    on_fail: "无 TF 注释 → 只能做无向共表达网络（WGCNA），不能推断 TF→靶基因的调控方向。可以从 PlantTFDB 或同源推断获取 TF 列表。"
