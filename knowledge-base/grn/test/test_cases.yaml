# GRN test cases
# 8-10 cases

test_cases:
  # --- inference_method ---
  - name: "genie3_with_tf_prior"
    rule_section: inference_method
    input_profile:
      sample_count: 18
      tf_annotation: true
    expected:
      rule_id: "grn-genie3-standard-001"
      recommend: "genie3_with_tf_prior"

  - name: "wgcna_no_tf_annotation"
    rule_section: inference_method
    input_profile:
      sample_count: 30
      tf_annotation: false
    expected:
      rule_id: "grn-wgcna-undirected-003"
      recommend: "wgcna_coexpression"

  - name: "fallback_low_sample_count"
    rule_section: inference_method
    input_profile:
      sample_count: 5
      tf_annotation: true
    expected:
      rule_id: "grn-fallback-999"
      action: "delegate_to_expert"

  # --- tf_database ---
  - name: "rice_planttfdb_annotation"
    rule_section: tf_database
    input_profile:
      species_detected: "oryza_sativa"
    expected:
      rule_id: "tf-planttfdb-001"
      recommend: "planttfdb"

  - name: "maize_planttfdb_annotation"
    rule_section: tf_database
    input_profile:
      species_detected: "zea_mays"
    expected:
      rule_id: "tf-planttfdb-001"
      recommend: "planttfdb"

  - name: "arabidopsis_planttfdb"
    rule_section: tf_database
    input_profile:
      species_detected: "arabidopsis_thaliana"
    expected:
      rule_id: "tf-planttfdb-001"
      recommend: "planttfdb"

  - name: "unknown_species_homolog"
    rule_section: tf_database
    input_profile:
      species_detected: "unknown"
    expected:
      rule_id: "tf-homolog-infer-002"
      recommend: "homolog_inference"

  # --- network_analysis ---
  - name: "hub_detection_centrality"
    rule_section: network_analysis
    input_profile: {}
    expected:
      rule_id: "na-hub-detection-001"
      action: "degree_centrality_and_betweenness"

  - name: "large_network_community_detection"
    rule_section: network_analysis
    input_profile:
      network_size: 800
    expected:
      rule_id: "na-module-002"
      recommend: "community_detection"

  - name: "soybean_planttfdb"
    rule_section: tf_database
    input_profile:
      species_detected: "glycine_max"
    expected:
      rule_id: "tf-planttfdb-001"
      recommend: "planttfdb"
