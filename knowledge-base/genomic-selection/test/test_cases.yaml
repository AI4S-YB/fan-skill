test_cases:
  - name: "standard_qc_preprocessing"
    rule_section: genotype_preprocessing
    input_profile:
      snp_count: 10000
    expected:
      rule_id: "gs-preprocess-standard-001"

  - name: "low_density_preprocessing"
    rule_section: genotype_preprocessing
    input_profile:
      snp_count: 500
    expected:
      rule_id: "gs-preprocess-low-density-002"

  - name: "high_missing_impute"
    rule_section: genotype_preprocessing
    input_profile:
      missing_rate: 0.10
    expected:
      rule_id: "gs-preprocess-impute-003"

  - name: "gblup_large_population"
    rule_section: model_selection
    input_profile:
      sample_count: 600
      snp_count: 30000
    expected:
      rule_id: "gs-gblup-large-001"
      recommend: "gblup"

  - name: "bayes_high_density"
    rule_section: model_selection
    input_profile:
      snp_count: 80000
      sample_count: 300
    expected:
      rule_id: "gs-bayes-high-density-002"
      recommend: "bayes_b_or_c"

  - name: "rrblup_small_population"
    rule_section: model_selection
    input_profile:
      sample_count: 150
    expected:
      rule_id: "gs-rrblup-small-003"
      recommend: "rrblup"

  - name: "deep_learning_very_large"
    rule_section: model_selection
    input_profile:
      sample_count: 3000
      snp_count: 150000
    expected:
      rule_id: "gs-bayes-high-density-002"
      recommend: "bayes_b_or_c"

  - name: "multitrait_gs"
    rule_section: model_selection
    input_profile:
      trait_count: 3
    expected:
      rule_id: "gs-multitrait-005"

  - name: "standard_cv_5x5"
    rule_section: cross_validation
    input_profile:
      sample_count: 500
    expected:
      rule_id: "cv-standard-5x5-001"

  - name: "small_cv_10x10"
    rule_section: cross_validation
    input_profile:
      sample_count: 200
    expected:
      rule_id: "cv-small-10x10-002"

  - name: "loo_cv_very_small"
    rule_section: cross_validation
    input_profile:
      sample_count: 80
    expected:
      rule_id: "cv-small-10x10-002"

  - name: "structured_cv"
    rule_section: cross_validation
    input_profile:
      population_structure: "strong"
    expected:
      rule_id: "cv-structured-004"

  - name: "standard_accuracy_metrics"
    rule_section: accuracy_metrics
    input_profile: {}
    expected:
      rule_id: "acc-standard-001"

  - name: "top_percent_selection"
    rule_section: selection_strategy
    input_profile:
      breeding_goal: "genetic_gain"
    expected:
      rule_id: "sel-top-percent-001"

  - name: "selection_index_multitrait"
    rule_section: selection_strategy
    input_profile:
      trait_count: 3
    expected:
      rule_id: "sel-index-002"
