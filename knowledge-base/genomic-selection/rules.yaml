name: genomic-selection
description: "Plant genomic selection / genomic prediction — from genotype+phenotype to GEBVs and selection decisions. Covers rrBLUP, GBLUP, BayesA/B/C, deep learning GS, cross-validation, and multi-trait indices. Dual-mode B+C decision system."
triggers:
  - "genomic selection"
  - "genomic prediction"
  - "gblup"
  - "bayesian"
  - "breeding value"
  - "rr-blup"
  - "bayes"
  - "cross-validation"

inputs:
  - data_profile.json
  - genotype_data
  - phenotype_data
  - params.yaml

outputs:
  - gebv_table
  - prediction_accuracy
  - cross_validation_table
  - selection_candidates
  - analysis_report

version: "1.0"
analysis: genomic_selection

inputs_required:
  - data_profile.json
  - genotype_data
  - phenotype_data
  - params.yaml

# ============================================================
# 决策节点 1: 基因型数据预处理
# ============================================================
genotype_preprocessing:
  - rule_id: "gs-preprocess-standard-001"
    priority: 5
    condition:
      snp_count: ">= 1000"
    action: "standard_qc_maf005"
    params: {maf: 0.05, geno: 0.1}
    reason: "标准 QC 过滤"

  - rule_id: "gs-preprocess-low-density-002"
    priority: 6
    condition:
      snp_count: "< 1000"
    action: "minimal_qc_maf001"
    params: {maf: 0.01, geno: 0.2}
    reason: "低密度标记放宽过滤阈值"

  - rule_id: "gs-preprocess-impute-003"
    priority: 5
    condition:
      missing_rate: "> 0.05"
    action: "impute_beagle"
    reason: "缺失率 > 5% 时先做基因型填充"
    tool_id: "gblup"

# ============================================================
# 决策节点 2: GS 模型选择 (核心)
# ============================================================
model_selection:
  - rule_id: "gs-gblup-large-001"
    priority: 10
    condition:
      sample_count: ">= 500"
      snp_count: "< 50000"
    recommend: "gblup"
    reason: "大群体中等密度 → GBLUP 计算效率高、准确性好"
    tool_id: "gblup"

  - rule_id: "gs-bayes-high-density-002"
    priority: 9
    condition:
      snp_count: ">= 50000"
      sample_count: ">= 200"
    recommend: "bayes_b_or_c"
    reason: "高密度标记 → BayesB/C 的变量选择可提高准确性"
    tool_id: "bayes-letters"

  - rule_id: "gs-rrblup-small-003"
    priority: 8
    condition:
      sample_count: "< 200"
    recommend: "rrblup"
    reason: "小群体 → rrBLUP 最简单稳健，不会有收敛问题"
    tool_id: "rrblup"

  - rule_id: "gs-deep-learning-004"
    priority: 7
    condition:
      sample_count: ">= 2000"
      snp_count: ">= 100000"
    recommend: "deep_learning_gs"
    reason: "超大群体高密度 → 深度学习可能捕获非线性效应"
    tool_id: "deep-learning-gs"

  - rule_id: "gs-multitrait-005"
    priority: 9
    condition:
      trait_count: "> 1"
    recommend: "mt_gblup"
    reason: "多性状 → 多性状模型可利用性状间遗传相关提高准确率"
    tool_id: "gblup"

  - rule_id: "gs-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"

# ============================================================
# 决策节点 3: 交叉验证策略
# ============================================================
cross_validation:
  - rule_id: "cv-standard-5x5-001"
    priority: 5
    condition:
      sample_count: ">= 300"
    action: "cv_5fold_5repeats"
    reason: "≥300 样本用 5-fold × 5 repeats"

  - rule_id: "cv-small-10x10-002"
    priority: 6
    condition:
      sample_count: "< 300"
    action: "cv_10fold_10repeats"
    reason: "<300 样本用更多重复以减少抽样误差"

  - rule_id: "cv-leave-one-out-003"
    priority: 4
    condition:
      sample_count: "< 100"
    action: "loo_cv"
    reason: "<100 样本 → 留一法交叉验证"

  - rule_id: "cv-structured-004"
    priority: 7
    condition:
      population_structure: "strong"
    action: "stratified_cv_by_subpopulation"
    reason: "强群体结构 → 分层 CV 避免高估准确性"

# ============================================================
# 决策节点 4: 预测准确性评估
# ============================================================
accuracy_metrics:
  - rule_id: "acc-standard-001"
    priority: 5
    action: "pearson_r_and_rmse"
    reason: "Pearson r + RMSE 是 GS 的标准评估"

  - rule_id: "acc-binary-002"
    priority: 5
    condition:
      trait_type: "binary"
    action: "auc_and_classification_accuracy"
    reason: "二分类性状用 AUC"

# ============================================================
# 决策节点 5: 育种值排名与选择
# ============================================================
selection_strategy:
  - rule_id: "sel-top-percent-001"
    priority: 5
    condition:
      breeding_goal: "genetic_gain"
    action: "select_top_10_percent"
    reason: "最大遗传进展 → 选 GEBV 最高的 10%"

  - rule_id: "sel-index-002"
    priority: 6
    condition:
      trait_count: "> 1"
    action: "selection_index"
    reason: "多性状 → 构建选择指数平衡多个育种目标"

design_gates:
  - id: "gs-training-size"
    rule: "基因组选择需要训练群体"
    check: "samples_with_phenotype >= 100"
    severity: "warn"
    on_fail: "训练群体 < 100 → 预测准确性通常 < 0.3（Pearson r）。基因组选择的预测准确性随训练群体增加而提高。如果群体包含家系结构，预测准确性可能略高于随机群体。"
  - id: "gs-heritability"
    rule: "预测准确性受限于性状遗传力的平方根"
    check: "heritability >= 0.1 or heritability == 'unknown'"
    severity: "warn"
    on_fail: "遗传力 < 0.1 → 预测准确性的理论上限仅为 0.32（√0.1）。GS 仍然可以尝试，但预测效果会很有限。如果有多环境数据，可以用重复测量提高遗传力估计的准确性。"
  - id: "gs-markers-minimum"
    rule: "GBLUP 至少需要 1000 个标记；BayesB 至少需要 5000 个"
    check: "snp_count >= 1000"
    severity: "warn"
    on_fail: "标记数 < 1000 → 基因组覆盖度低，可能无法充分捕获全基因组的遗传变异。预测准确性会受到限制。rrBLUP 对低密度标记最稳健。"
  - id: "gs-phenotype-required"
    rule: "基因组选择需要基因型 + 表型两种数据"
    check: "has_genotype == true and has_phenotype == true"
    severity: "block"
    on_fail: "GS 需要基因型和表型配对数据构建预测模型。缺少任何一种都无法做 GS。"
