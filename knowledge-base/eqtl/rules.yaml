name: eqtl
description: "Plant expression quantitative trait locus (eQTL) analysis — from genotype + expression data to cis/trans-eQTL identification, colocalization with GWAS loci, and multi-tissue eQTL comparison. Uses MatrixEQTL for fast linear model testing, with plant-specific guidance on polyploid mapping complexity and tissue atlas availability."
triggers:
  - "eqtl"
  - "expression qtl"
  - "qtl mapping of expression"
  - "matrixeqtl"
  - "tensorqtl"
  - "cis-eqtl"
  - "trans-eqtl"
  - "gene-variant association"

inputs:
  - genotype_data
  - expression_matrix
  - covariates

outputs:
  - cis_eqtl_table
  - trans_eqtl_table
  - colocalization_table
  - analysis_report

version: "1.0"
analysis: eqtl_analysis

eqtl_type:
  - rule_id: "eqtl-cis-standard-001"
    priority: 10
    condition:
      distance_focus: "cis"
    recommend: "cis_eqtl_matrixeqtl"
    reason: "cis-eQTL ±1Mb → MatrixEQTL线性模型"
    tool_id: "cis-trans"
    params:
      cis_dist: 1000000
      pvOutputThreshold: 1e-5
      useModel: "modelLINEAR"
  - rule_id: "eqtl-trans-002"
    priority: 9
    condition:
      distance_focus: "trans"
      sample_count: ">= 200"
    recommend: "trans_eqtl_matrixeqtl"
    reason: "trans-eQTL需要大样本量"
    tool_id: "cis-trans"
    params:
      trans_dist_min: 1000000
      pvOutputThreshold: 1e-8
      useModel: "modelLINEAR"
      fdr_threshold: 0.05
      min_sample_count: 200

multiple_testing:
  - rule_id: "eqtl-fdr-001"
    priority: 5
    condition:
      test_count: ">= 1000000"
    action: "fdr_0.05_with_permutation"
    reason: "百万级检验 → FDR+置换双重校正"
    params:
      fdr_method: "BH"
      fdr_threshold: 0.05
      permutation_count: 1000
      min_test_count: 1000000

colocalization:
  - rule_id: "eqtl-coloc-gwas-001"
    priority: 5
    condition:
      has_gwas_results: true
    recommend: "coloc_analysis"
    reason: "有GWAS结果 → coloc共定位分析"
    tool_id: "colocalization"
    params:
      p12: 0.25
      p1: 1e-4
      p2: 1e-4

multi_tissue:
  - rule_id: "eqtl-multi-tissue-001"
    priority: 5
    condition:
      tissue_count: ">= 2"
    recommend: "tissue_specific_vs_shared_eqtl"
    reason: "多组织 → 区分组织特异性和共享eQTL"
    tool_id: "multi-tissue"
    params:
      min_tissue_count: 2
      tissue_specificity_threshold: 0.8
      shared_eqtl_pvalue_threshold: 1e-5
      effect_size_consistency: 0.5

fallback:
  - rule_id: "eqtl-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params:
      reason: "no_matching_rule"

design_gates:
  - id: "eqtl-matched-data"
    rule: "eQTL 分析需要来自同一个体的基因型和表达量两种数据"
    check: "has_genotype == true and has_expression == true"
    severity: "block"
    on_fail: "eQTL 需要同一批个体的基因型 + 表达量配对数据。缺少任何一种都无法做 eQTL。基因型和表达量必须来自同一个体（或同一基因型系）。"
  - id: "eqtl-sample-size"
    rule: "cis-eQTL 分析至少需要 50 个个体；trans-eQTL 至少需要 200 个"
    check: "sample_count >= 50"
    severity: "warn"
    on_fail: "样本量 < 50 → cis-eQTL 统计功效仅能检测超强效应（解释 > 30% 表达变异的局部变异）。trans-eQTL 在全基因组尺度上多重检验负担极重，< 200 样本时几乎没有统计功效。"
  - id: "eqtl-population-structure"
    rule: "必须校正群体结构以避免假阳性 eQTL"
    check: "population_structure_accounted == true"
    severity: "block"
    on_fail: "未校正群体结构 → 群体分化导致的基因型-表达伪关联会被误判为 eQTL。使用 PCA 前几个 PCs 或 kinship 矩阵作为协变量。"
  - id: "eqtl-polyploid-homeolog"
    rule: "多倍体物种的 eQTL 需要区分同源等位基因的表达"
    check: "homeolog_expression_resolved == true or ploidy <= 2"
    severity: "warn"
    on_fail: "多倍体中 read 可能比对到多个同源位点，无法确定表达来自哪个亚基因组的拷贝。需要亚基因组特异性的表达定量方法。"
