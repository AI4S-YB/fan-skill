name: phenotype
description: "Plant phenotype data analysis — heritability estimation, BLUP/BLUE, spatial correction, multi-environment trial summary (AMMI/GGE). Dual-mode B+C decision system."
triggers:
  - "phenotype"
  - "phenotyping"
  - "phenomics"
  - "field trial"
  - "heritability"
  - "blup"
  - "blues"
  - "spatial correction"

inputs:
  - data_profile.json
  - phenotype_data
  - trial_design_info
  - params.yaml

outputs:
  - heritability_table
  - blup_blues_table
  - met_summary_table
  - spatial_correction_report
  - analysis_report

version: "1.0"
analysis: phenotype

inputs_required:
  - data_profile.json
  - phenotype_data
  - trial_design_info
  - params.yaml

heritability:
  - rule_id: "h2-multi-env-001"
    priority: 10
    condition:
      env_count: ">= 2"
      rep_count: ">= 2"
    recommend: "mixed_model_h2"
    reason: "多环境多重复 → 混合线性模型估计广义/狭义遗传力"
    tool_id: "heritability"
    params:
      method: "REML"
      genotype_random: true
      env_random: true
      gxe_random: true

  - rule_id: "h2-single-rep-002"
    priority: 8
    condition:
      env_count: 1
      rep_count: ">= 2"
    recommend: "anova_h2"
    reason: "单环境有重复 → ANOVA估计广义遗传力"
    tool_id: "heritability"
    params:
      method: "ANOVA"
      genotype_random: true
      formula: "VG / (VG + VE/r)"

  - rule_id: "h2-unreplicated-003"
    priority: 6
    condition:
      rep_count: 1
    action: "warn_cannot_estimate"
    reason: "无重复 → 无法估计遗传力，只能计算表型描述性统计"
    params:
      action: "descriptive_only"
      report_cv: true
      report_summary_stats: true

breeding_value:
  - rule_id: "bv-multi-blup-001"
    priority: 10
    condition:
      env_count: ">= 2"
      genotype_connected: true
    recommend: "multi_env_blup"
    reason: "多环境连接设计 → 跨环境BLUP"
    tool_id: "blup-blues"
    params:
      genotype_random: true
      gxe_random: true
      env_random: true
      method: "REML"

  - rule_id: "bv-single-blue-002"
    priority: 8
    condition:
      env_count: 1
      genotype_random: true
    recommend: "blup_single_env"
    reason: "基因型作为随机效应 → BLUP"
    tool_id: "blup-blues"
    params:
      genotype_random: true
      method: "REML"
      heritability_input: "{h2_value}"

  - rule_id: "bv-fixed-genotype-003"
    priority: 7
    condition:
      genotype_random: false
    recommend: "blue"
    reason: "基因型作为固定效应 → BLUE (最佳线性无偏估计)"
    tool_id: "blup-blues"
    params:
      genotype_random: false
      method: "OLS"
      adjust_for_blocks: true

spatial_correction:
  - rule_id: "spatial-field-trial-001"
    priority: 5
    condition:
      trial_type: "field"
      has_row_col_info: true
    recommend: "spatial_ar1_model"
    reason: "田间试验有行列信息 → AR1×AR1 空间模型"
    tool_id: "spatial-correction"
    params:
      row_cor: "ar1"
      col_cor: "ar1"
      model: "spatial"
      nse: true

  - rule_id: "spatial-no-coords-002"
    priority: 5
    condition:
      trial_type: "field"
      has_row_col_info: false
    recommend: "check_cv_and_warn"
    reason: "无行列信息 → 检查 CV 值，如果 >15% 需考虑潜在空间变异"
    tool_id: "spatial-correction"
    params:
      cv_threshold: 15
      check_only: true
      warn_message: "Consider spatial variation if CV > 15%"

met_summary:
  - rule_id: "met-stability-001"
    priority: 5
    condition:
      env_count: ">= 3"
    recommend: "ammi_or_gge"
    reason: "≥3 环境 → AMMI/GGE biplot 分析品种稳定性"
    tool_id: "met-summary"
    params:
      method: "AMMI"
      n_pc: 2
      biplot: true
      stability_index: true

  - rule_id: "met-correlation-002"
    priority: 5
    condition:
      env_count: ">= 2"
    recommend: "env_correlation_and_summary"
    reason: "计算环境间相关系数和汇总统计"
    tool_id: "met-summary"
    params:
      correlation_method: "pearson"
      summary_stats: true
      env_mean_separation: true

fallback:
  - rule_id: "pheno-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params:
      reason: "No matching rule found"
      suggestion: "Consult phenotype analysis specialist"

design_gates:
  - id: "pheno-measurement-method"
    rule: "表型分析需要明确表型测量方法和单位"
    check: "measurement_method_specified == true"
    severity: "block"
    on_fail: |
      测量方法不明确 → 不同方法测量的同一性状（如 SPAD vs 化学法测叶绿素含量）不能直接比较。需要记录测量仪器、协议和单位。
  - id: "pheno-environment-documented"
    rule: "表型数据应包含环境信息（地点、年份、管理措施）"
    check: "environment_documented == true"
    severity: "warn"
    on_fail: |
      缺少环境信息 → 无法区分遗传效应和环境效应。相同基因型在不同环境下的表型可以相差 2-5 倍。至少记录地点、年份和基本管理措施。
  - id: "pheno-heritability"
    rule: "进行遗传分析前应估计性状的广义遗传力"
    check: "heritability_estimated == true"
    severity: "warn"
    on_fail: |
      未估计遗传力 → 无法判断表型变异的遗传基础。遗传力 < 0.2 的性状进行 GWAS/QTL 分图的统计功效很低。
  - id: "pheno-outlier-check"
    rule: "表型数据应进行异常值检查和分布检验"
    check: "outlier_checked == true"
    severity: "warn"
    on_fail: |
      未检查异常值 → 极端值可能严重影响关联分析和遗传参数估计。对于偏态分布的表型（如抗病评级），需要进行数据转换（log/sqrt/Box-Cox）。
