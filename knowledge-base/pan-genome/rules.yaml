name: pan-genome
description: "Plant pan-genome analysis — graph construction (Minigraph/PGGB), core/variable gene classification, PAV detection, SV genotyping, and pan-genome visualization. Supports small to large plant genome cohorts. Dual-mode B+C decision system."
triggers:
  - "pan-genome"
  - "pangenome"
  - "core genome"
  - "variable genome"
  - "pav"
  - "sv"
  - "graph genome"
  - "minigraph"

inputs:
  - data_profile.json
  - params.yaml
  - genome_list
  - annotation_list

outputs:
  - pan_genome_graph
  - core_variable_table
  - pav_table
  - analysis_report

version: "1.0"
analysis: pan_genome

inputs_required:
  - data_profile.json
  - params.yaml
  - genome_list
  - annotation_list

# ============================================================
# Decision Node 1: Pan-genome Graph Construction
# ============================================================
graph_construction:
  - rule_id: "pan-minigraph-small-001"
    priority: 10
    condition:
      genome_count: "< 20"
    recommend: "minigraph"
    reason: "<20基因组 → Minigraph高效构建泛基因组图"
    tool_id: "minigraph"

  - rule_id: "pan-pggb-large-002"
    priority: 9
    condition:
      genome_count: ">= 20"
    recommend: "pggb"
    reason: "≥20基因组 → PGGB全比对图"
    tool_id: "pggb"

  - rule_id: "pan-cactus-complex-003"
    priority: 10
    condition:
      genome_count: ">= 20"
      has_haplotypes: true
    recommend: "cactus_pangenome"
    reason: "≥20基因组且含单倍型 → Cactus渐进式比对更稳健"

# ============================================================
# Decision Node 2: Core/Variable Gene Classification
# ============================================================
core_variable:
  - rule_id: "pan-core-threshold-001"
    priority: 5
    recommend: "presence_absence_matrix"
    reason: "按出现频率分类核心/软核心/可变/私有基因"
    tool_id: "core-variable"
    params:
      core_threshold: ">= 95% genomes"
      soft_core_threshold: ">= 80% and < 95%"
      variable_threshold: ">= 15% and < 80%"
      private_threshold: "< 15%"

  - rule_id: "pan-core-orthofinder-002"
    priority: 6
    condition:
      has_orthogroups: true
    recommend: "orthofinder_clustering"
    reason: "已有OrthoFinder结果 → 基于直系同源群定义核心基因组"

# ============================================================
# Decision Node 3: PAV Detection
# ============================================================
pav_detection:
  - rule_id: "pan-pav-pangene-001"
    priority: 5
    recommend: "pangene_or_panGenie"
    reason: "PAV检测 → PanGene或PanGenie"
    tool_id: "pav-detection"

  - rule_id: "pan-pav-svgap-002"
    priority: 6
    condition:
      has_graph: true
    recommend: "svgap_pav"
    reason: "已有泛基因组图 → SV-GAP从图中提取PAV"

# ============================================================
# Decision Node 4: SV Genotyping
# ============================================================
sv_genotyping:
  - rule_id: "pan-sv-vg-001"
    priority: 5
    recommend: "vg_giraffe"
    reason: "SV基因分型 → vg giraffe比对到泛基因组图"
    tool_id: "sv-genotyping"

  - rule_id: "pan-sv-graphaligner-002"
    priority: 6
    condition:
      sv_class: "large_sv"
    recommend: "graphaligner"
    reason: "大片段SV → GraphAligner长读长比对更准确"

  - rule_id: "pan-sv-paragraph-003"
    priority: 6
    condition:
      sv_class: "small_sv"
    recommend: "paragraph"
    reason: "小SV → Paragraph基因分型工具"

# ============================================================
# Decision Node 5: Visualization
# ============================================================
visualization:
  - rule_id: "pan-vis-odgi-001"
    priority: 5
    recommend: "odgi_viz"
    reason: "泛基因组图可视化 → ODGI layout + Bandage"
    tool_id: "visualization"

  - rule_id: "pan-vis-circos-002"
    priority: 6
    condition:
      view_type: "comparative"
    recommend: "circos_plot"
    reason: "多基因组比较 → Circos图展示PAV分布"

# ============================================================
# Fallback
# ============================================================
fallback:
  - rule_id: "pan-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"

design_gates:
  - id: "pan-multiple-accessions"
    rule: "泛基因组分析至少需要 3 个种质的基因组组装"
    check: "accession_count >= 3"
    severity: "block"
    on_fail: "< 3 个种质 → 不足以构建有意义的泛基因组。一个基因组 + 一个近缘种质的比较是 comparative genomics，不是 pan-genomics。泛基因组需要捕获物种内的基因存在/缺失变异 (PAV)。"
  - id: "pan-assembly-quality"
    rule: "每个种质的基因组组装质量应达到染色体水平或至少 scaffold N50 > 1Mb"
    check: "assembly_quality_adequate == true"
    severity: "warn"
    on_fail: "组装质量不足 → 基因存在/缺失的判定会受组装完整性影响。片段化组装中"缺失"的基因可能是组装间隙导致的，而非真正的缺失变异。"
  - id: "pan-annotation-consistency"
    rule: "所有种质的基因注释应使用统一的方法和参数"
    check: "uniform_annotation_pipeline == true"
    severity: "block"
    on_fail: "不同种质使用不同的注释方法 → 基因数量的差异可能来自注释方法的不同，而非生物学上的基因存在/缺失变异。必须用统一的 annotation pipeline（如 BRAKER3 + 相同参数）对所有种质进行注释。"
