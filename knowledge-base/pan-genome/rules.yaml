name: pan-genome
description: "Plant pan-genome analysis вҖ” graph construction (Minigraph/PGGB), core/variable gene classification, PAV detection, SV genotyping, and pan-genome visualization. Supports small to large plant genome cohorts. Dual-mode B+C decision system."
triggers:
  - "pan-genome"
  - "pangenome"
  - "core genome"
  - "variable genome"
  - "pav"
  - "sv"
  - "graph genome"
  - "minigraph"

inputs:
  - data_profile.json
  - params.yaml
  - genome_list
  - annotation_list

outputs:
  - analysis_report
  - figures
  - result_tables

version: "1.0"
analysis: pan_genome

inputs_required:
  - data_profile.json
  - params.yaml
  - genome_list
  - annotation_list

# ============================================================
# Decision Node 1: Pan-genome Graph Construction
# ============================================================
graph_construction:
  - rule_id: "pan-minigraph-small-001"
    priority: 10
    condition:
      genome_count: "< 20"
    recommend: "minigraph"
    reason: "<20еҹәеӣ з»„ вҶ’ Minigraphй«ҳж•Ҳжһ„е»әжіӣеҹәеӣ з»„еӣҫ"
    tool_id: "minigraph"

  - rule_id: "pan-pggb-large-002"
    priority: 9
    condition:
      genome_count: ">= 20"
    recommend: "pggb"
    reason: "вүҘ20еҹәеӣ з»„ вҶ’ PGGBе…ЁжҜ”еҜ№еӣҫ"
    tool_id: "pggb"

  - rule_id: "pan-cactus-complex-003"
    priority: 10
    condition:
      genome_count: ">= 20"
      has_haplotypes: true
    recommend: "cactus_pangenome"
    reason: "вүҘ20еҹәеӣ з»„дё”еҗ«еҚ•еҖҚеһӢ вҶ’ CactusжёҗиҝӣејҸжҜ”еҜ№жӣҙзЁіеҒҘ"

# ============================================================
# Decision Node 2: Core/Variable Gene Classification
# ============================================================
core_variable:
  - rule_id: "pan-core-threshold-001"
    priority: 5
    recommend: "presence_absence_matrix"
    reason: "жҢүеҮәзҺ°йў‘зҺҮеҲҶзұ»ж ёеҝғ/иҪҜж ёеҝғ/еҸҜеҸҳ/з§Ғжңүеҹәеӣ "
    tool_id: "core-variable"
    params:
      core_threshold: ">= 95% genomes"
      soft_core_threshold: ">= 80% and < 95%"
      variable_threshold: ">= 15% and < 80%"
      private_threshold: "< 15%"

  - rule_id: "pan-core-orthofinder-002"
    priority: 6
    condition:
      has_orthogroups: true
    recommend: "orthofinder_clustering"
    reason: "е·ІжңүOrthoFinderз»“жһң вҶ’ еҹәдәҺзӣҙзі»еҗҢжәҗзҫӨе®ҡд№үж ёеҝғеҹәеӣ з»„"

# ============================================================
# Decision Node 3: PAV Detection
# ============================================================
pav_detection:
  - rule_id: "pan-pav-pangene-001"
    priority: 5
    recommend: "pangene_or_panGenie"
    reason: "PAVжЈҖжөӢ вҶ’ PanGeneжҲ–PanGenie"
    tool_id: "pav-detection"

  - rule_id: "pan-pav-svgap-002"
    priority: 6
    condition:
      has_graph: true
    recommend: "svgap_pav"
    reason: "е·Іжңүжіӣеҹәеӣ з»„еӣҫ вҶ’ SV-GAPд»ҺеӣҫдёӯжҸҗеҸ–PAV"

# ============================================================
# Decision Node 4: SV Genotyping
# ============================================================
sv_genotyping:
  - rule_id: "pan-sv-vg-001"
    priority: 5
    recommend: "vg_giraffe"
    reason: "SVеҹәеӣ еҲҶеһӢ вҶ’ vg giraffeжҜ”еҜ№еҲ°жіӣеҹәеӣ з»„еӣҫ"
    tool_id: "sv-genotyping"

  - rule_id: "pan-sv-graphaligner-002"
    priority: 6
    condition:
      sv_class: "large_sv"
    recommend: "graphaligner"
    reason: "еӨ§зүҮж®өSV вҶ’ GraphAlignerй•ҝиҜ»й•ҝжҜ”еҜ№жӣҙеҮҶзЎ®"

  - rule_id: "pan-sv-paragraph-003"
    priority: 6
    condition:
      sv_class: "small_sv"
    recommend: "paragraph"
    reason: "е°ҸSV вҶ’ Paragraphеҹәеӣ еҲҶеһӢе·Ҙе…·"

# ============================================================
# Decision Node 5: Visualization
# ============================================================
visualization:
  - rule_id: "pan-vis-odgi-001"
    priority: 5
    recommend: "odgi_viz"
    reason: "жіӣеҹәеӣ з»„еӣҫеҸҜи§ҶеҢ– вҶ’ ODGI layout + Bandage"
    tool_id: "visualization"

  - rule_id: "pan-vis-circos-002"
    priority: 6
    condition:
      view_type: "comparative"
    recommend: "circos_plot"
    reason: "еӨҡеҹәеӣ з»„жҜ”иҫғ вҶ’ Circosеӣҫеұ•зӨәPAVеҲҶеёғ"

# ============================================================
# Fallback
# ============================================================
fallback:
  - rule_id: "pan-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
