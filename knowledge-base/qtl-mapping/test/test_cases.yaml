# QTL 作图决策矩阵测试用例
# 每条 rule 至少一个 case 能触发

test_cases:
  # --- 遗传图谱构建 ---
  - name: "standard_biparental_genetic_map"
    rule_section: genetic_map
    input_profile:
      population_type: "f2"
    expected:
      rule_id: "gmap-rqtl-standard-001"
      recommend: "rqtl_est_map"

  - name: "high_density_lepmap"
    rule_section: genetic_map
    input_profile:
      population_type: "unknown"
      marker_count: 15000
    expected:
      rule_id: "gmap-lepmap-large-002"
      recommend: "lepmap3"

  - name: "magic_population_asmap"
    rule_section: genetic_map
    input_profile:
      population_type: "maggic"
      marker_count: 5000
    expected:
      rule_id: "gmap-asmap-003"
      recommend: "asmap"

  # --- QTL 扫描方法选择 ---
  - name: "standard_biparental_cim"
    rule_section: qtl_method
    input_profile:
      population_type: "ril"
    expected:
      rule_id: "qtl-cim-standard-001"
      recommend: "composite_interval_mapping"

  - name: "expected_multiple_qtl_mqm"
    rule_section: qtl_method
    input_profile:
      expected_qtl_count: 5
      marker_count: 500
    expected:
      rule_id: "qtl-mqm-multiple-002"
      recommend: "multiple_qtl_mapping"

  - name: "low_marker_interval_mapping"
    rule_section: qtl_method
    input_profile:
      marker_count: 150
    expected:
      rule_id: "qtl-im-simple-003"
      recommend: "interval_mapping"

  # --- LOD 阈值确定 ---
  - name: "large_sample_permutation"
    rule_section: lod_threshold
    input_profile:
      sample_count: 200
    expected:
      rule_id: "lod-permutation-001"
      action: "permutation_1000"

  - name: "small_sample_analytical_threshold"
    rule_section: lod_threshold
    input_profile:
      sample_count: 50
    expected:
      rule_id: "lod-analytical-002"
      action: "analytical_or_500_permutations"

  # --- 多环境 QTL ---
  - name: "multi_environment_joint_qtl"
    rule_section: multi_env_qtl
    input_profile:
      env_count: 3
    expected:
      rule_id: "qtl-met-joint-001"
      recommend: "joint_multi_env_qtl"

  # --- 无规则匹配 → fallback ---
  - name: "no_rule_matches_fallback"
    rule_section: genetic_map
    input_profile:
      population_type: "unknown"
      marker_count: 500
    expected:
      rule_id: "qtl-fallback-999"
      action: "delegate_to_expert"
