name: qtl-mapping
description: "Plant QTL mapping for biparental populations — genetic map construction, composite interval mapping (CIM), multiple QTL mapping (MQM), and multi-environment QTL analysis. Dual-mode B+C decision system."
triggers:
  - "qtl"
  - "linkage mapping"
  - "biparental"
  - "ril"
  - "f2"
  - "bc"
  - "dh"
  - "qtl mapping"

inputs:
  - data_profile.json
  - genotype_data
  - phenotype_data
  - population_info
  - params.yaml

outputs:
  - genetic_map
  - lod_profile_table
  - qtl_interval_table
  - analysis_report

# QTL 作图决策矩阵 — Rule 模式的决策规则
# 规则按优先级排序，多条同时命中时取 priority 最高的

version: "1.0"
analysis: qtl_mapping

inputs_required:
  - data_profile.json
  - genotype_data
  - phenotype_data
  - population_info
  - params.yaml

genetic_map:
  - rule_id: "gmap-rqtl-standard-001"
    priority: 10
    condition:
      population_type: ["f2", "ril", "dh", "bc"]
    recommend: "rqtl_est_map"
    reason: "标准双亲群体 -> R/qtl est.map 构建遗传图谱"
    tool_id: "genetic-map"

  - rule_id: "gmap-lepmap-large-002"
    priority: 9
    condition:
      marker_count: ">= 10000"
    recommend: "lepmap3"
    reason: "高密度标记 -> LepMap3 处理效率更高"
    tool_id: "genetic-map"

  - rule_id: "gmap-asmap-003"
    priority: 8
    condition:
      population_type: "maggic"
    recommend: "asmap"
    reason: "MAGIC/多亲本群体 -> ASMap 更适合复杂群体"
    tool_id: "genetic-map"

qtl_method:
  - rule_id: "qtl-cim-standard-001"
    priority: 10
    condition:
      population_type: ["f2", "ril", "dh", "bc"]
    recommend: "composite_interval_mapping"
    reason: "复合区间作图 (CIM) 控制背景 QTL 效应，标准选择"
    tool_id: "composite-interval"

  - rule_id: "qtl-mqm-multiple-002"
    priority: 9
    condition:
      expected_qtl_count: ">= 3"
    recommend: "multiple_qtl_mapping"
    reason: "预期多个 QTL -> MQM 自动构建多 QTL 模型"
    tool_id: "multi-qtl"

  - rule_id: "qtl-im-simple-003"
    priority: 7
    condition:
      marker_count: "< 200"
    recommend: "interval_mapping"
    reason: "标记少 -> 区间作图 (IM) 足够"
    tool_id: "rqtl"

lod_threshold:
  - rule_id: "lod-permutation-001"
    priority: 10
    condition:
      sample_count: ">= 100"
    action: "permutation_1000"
    reason: ">=100样本 -> 1000次置换检验确定LOD阈值"
    tool_id: "rqtl"

  - rule_id: "lod-analytical-002"
    priority: 7
    condition:
      sample_count: "< 100"
    action: "analytical_or_500_permutations"
    reason: "<100样本 -> 分析性阈值或500次置换"
    tool_id: "rqtl"

multi_env_qtl:
  - rule_id: "qtl-met-joint-001"
    priority: 5
    condition:
      env_count: ">= 2"
    recommend: "joint_multi_env_qtl"
    reason: "多环境 -> 联合 QTL 分析可估计 QTLxE"
    tool_id: "multi-qtl"

fallback:
  - rule_id: "qtl-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    reason: "数据特征不在预设规则内，切换到 expert 推理"

design_gates:
  - id: "qtl-population-type"
    rule: "QTL 作图需要明确群体类型（F2/RIL/DH/BC/NAM/MAGIC）"
    check: "has_population_type == true"
    severity: "block"
    on_fail: "未指定群体类型 → 无法确定遗传模型和 QTL 检测方法。不同群体类型有不同的期望分离比和统计方法（F2 适合加性-显性模型，RIL 仅适合加性模型）。"
  - id: "qtl-population-size"
    rule: "QTL 作图群体至少需要 100 个个体才能检测中等效应的 QTL"
    check: "population_size >= 100"
    severity: "warn"
    on_fail: "群体 < 100 个体 → 仅能检测大效应 QTL（R² > 15%）。微效 QTL 会因功效不足而漏掉。0 个 QTL 是小群体的正常结果。增加群体大小或使用多环境数据提高 QTL 检测功效。"
  - id: "qtl-genetic-map"
    rule: "QTL 作图需要遗传图谱（标记顺序和遗传距离）"
    check: "has_genetic_map == true"
    severity: "block"
    on_fail: "没有遗传图谱 → 不能做 QTL 作图。遗传图谱提供标记间的重组率和顺序，是 QTL 区间定位和效应估计的基础。物理图谱不能直接替代遗传图谱（重组率在基因组上非均匀分布）。"
  - id: "qtl-phenotype-quality"
    rule: "QTL 表型数据需要来自重复试验（多环境/多年/多重复）"
    check: "has_replicated_phenotype == true"
    severity: "warn"
    on_fail: "单一环境无重复 → 无法区分遗传效应和环境效应。QTL×E 互作是植物数量性状的普遍特征，单环境 QTL 结果可能在其他环境中不成立。"
