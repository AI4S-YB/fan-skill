name: enviromics
description: "Plant enviromics analysis — environmental characterization, G×E modeling, TPE (target population of environments) delineation, and genotype stability. Covers PCA-based environmental indices, AMMI/GGE, factor-analytic models, reaction norms, and multi-metric stability analysis. Uses a dual-mode decision system (rule matrix + expert notebook)."
triggers:
  - "enviromics"
  - "envirotyping"
  - "environmental"
  - "weather data"
  - "soil data"
  - "geographic"
  - "enviromic"
  - "gei"

inputs:
  - environmental_data
  - genotype_data
  - phenotype_data

outputs:
  - env_index_table
  - gxe_variance_table
  - stability_metrics
  - tpe_classification
  - analysis_report

version: "1.0"
analysis: enviromics

env_index:
  - rule_id: "env-index-pca-001"
    priority: 10
    condition:
      climate_vars: ">= 3"
    recommend: "pca_env_index"
    reason: "≥3气候变量 → PCA构建综合环境指数"
    tool_id: "env-index"
  - rule_id: "env-index-single-002"
    priority: 8
    condition:
      climate_vars: "< 3"
    recommend: "direct_env_variable"
    reason: "气候变量少 → 直接使用原始变量"

gxe_modeling:
  - rule_id: "gxe-fa-001"
    priority: 10
    condition:
      env_count: ">= 5"
      genotype_count: ">= 50"
    recommend: "factor_analytic_gxe"
    reason: "≥5环境≥50基因型 → FA模型估计G×E协方差"
    tool_id: "gxe-modeling"
  - rule_id: "gxe-ammi-002"
    priority: 8
    condition:
      env_count: ">= 2"
    recommend: "ammi_gge"
    reason: "≥2环境 → AMMI/GGE描述G×E模式"
    tool_id: "gxe-modeling"
  - rule_id: "gxe-reaction-norm-003"
    priority: 7
    condition:
      env_index_available: true
    recommend: "reaction_norm"
    reason: "有环境指数 → 反应规范模型刻画基因型对环境梯度的响应"

tpe_analysis:
  - rule_id: "tpe-cluster-envs-001"
    priority: 5
    condition:
      env_count: ">= 5"
    recommend: "cluster_environments"
    reason: "≥5环境 → 聚类划分目标环境群体 (TPE)"
    tool_id: "tpe-analysis"

stability:
  - rule_id: "stab-multiple-metrics-001"
    priority: 5
    action: "multiple_stability_metrics"
    reason: "多种稳定性指标交叉验证"
    tool_id: "stability"

fallback:
  - rule_id: "env-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"

design_gates:
  - id: "env-multi-env-data"
    rule: "Enviromics 分析需要多环境数据（至少 2 个环境）"
    check: "env_count >= 2"
    severity: "block"
    on_fail: "单一环境 → 无法估计 G×E 互作效应，也无法做环境聚类或 TPE 划分。至少需要 2+ 个环境的表型和环境协变量数据。"
  - id: "env-data-quality"
    rule: "环境数据需要覆盖关键气候变量（温度、降水等）"
    check: "has_climate_variables == true"
    severity: "warn"
    on_fail: "缺少关键气候变量 → 环境指数 (environmental index) 可能无法充分表征环境差异。至少应包含温度 (Tmin/Tmax/Tmean) 和降水 (Precipitation)。可从公共数据库（WorldClim、NASA POWER）获取。"
  - id: "env-genotype-count"
    rule: "G×E 方差分解需要足够的基因型数量"
    check: "genotype_count >= 10"
    severity: "warn"
    on_fail: "基因型数量 < 10 → G×E 方差组分估计不稳定。AMMI/GGE 模型对基因型数量不足敏感，推荐 ≥ 20 个基因型。"
