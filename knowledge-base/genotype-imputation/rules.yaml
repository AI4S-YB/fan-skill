name: genotype-imputation
description: "Plant genotype imputation — from post-QC genotype data to fully imputed variant set. Covers pre-imputation QC, Beagle 5, IMPUTE2, Minimac4, polyploid imputation, and post-imputation filtering. Uses a dual-mode decision system (rule matrix + expert notebook)."
triggers:
  - "imputation"
  - "genotype imputation"
  - "beagle"
  - "impute"
  - "minimac"
  - "phasing"
  - "haplotype"
  - "low-density"

inputs:
  - data_profile.json
  - genotype_data (VCF or PLINK)
  - reference_panel_info
  - params.yaml

outputs:
  - vcf_file
  - variant_stats
  - qc_report
  - analysis_report

# 基因型填充决策矩阵 — Rule 模式的决策规则
# 规则按优先级排序，多条同时命中时取 priority 最高的

version: "1.0"
analysis: genotype_imputation

inputs_required:
  - data_profile.json
  - genotype_data (VCF or PLINK)
  - reference_panel_info
  - params.yaml

# ============================================================
# 决策节点 1: 预填充 QC
# ============================================================
pre_imputation_qc:
  - rule_id: "preimp-standard-001"
    priority: 5
    condition:
      snp_count: ">= 1000"
    action: "standard_qc"
    params: {maf: 0.01, geno: 0.10, hwe: 1e-6}
    reason: "标准预填充 QC"
    tool_id: "pre-imputation-qc"

  - rule_id: "preimp-relaxed-002"
    priority: 5
    condition:
      snp_count: "< 1000"
    action: "relaxed_qc"
    params: {maf: 0.01, geno: 0.20}
    reason: "标记少时放宽缺失率阈值"

# ============================================================
# 决策节点 2: 填充工具选择 (核心)
# ============================================================
imputation_tool:
  - rule_id: "imp-beagle-small-001"
    priority: 10
    condition:
      sample_count: "< 500"
      snp_count: "< 50000"
    recommend: "beagle"
    reason: "小-中等数据 → Beagle 5 速度快，无需参考面板"
    tool_id: "beagle"
    params:
      nthreads: 4
      window: 40
      overlap: 4
      ne: 100000
      impute: true
      gtlikelihood: "none"
      reference_panel: null

  - rule_id: "imp-impute2-reference-002"
    priority: 9
    condition:
      has_reference_panel: true
      reference_panel_type: "haplotype"
    recommend: "impute2"
    reason: "有单倍型参考面板 → IMPUTE2 利用 LD 信息充分"
    tool_id: "impute2"
    params:
      buffer: 1000
      allow_large_regions: true
      Ne: 20000
      buffer_size: 500
      phase: true
      impute2_cmd: "-use_prephased_g"
      reference_haplotypes: "required"
      reference_legend: "required"

  - rule_id: "imp-minimac-large-003"
    priority: 8
    condition:
      sample_count: ">= 500"
    recommend: "minimac4"
    reason: "大样本 → Minimac4 计算效率最高"
    tool_id: "minimac"
    params:
      cpus: 8
      chunks: 1
      format: "vcf"
      ref_format: "m3vcf"
      prob_threshold: 0.9
      rsq_filter: 0.3
      maf_threshold: 0.01
      reference_panel: "required"
      prephase_tool: "eagle"

  - rule_id: "imp-polyploid-004"
    priority: 9
    tool_id: "beagle"
    condition:
      ploidy: ["allopolyploid", "autopolyploid"]
    recommend: "beagle_polyploid"
    reason: "多倍体 → Beagle 支持多倍体填充，IMPUTE2 不支持"
    params:
      ploidy: 4
      nthreads: 4
      window: 40
      overlap: 4
      ne: 100000
      impute: true
      dosages: true
      output_dosage_format: "gp"
      subgenome_handling: "separate"

# ============================================================
# 决策节点 3: 种质资源考虑
# ============================================================
germplasm_consideration:
  - rule_id: "germ-panmictic-001"
    priority: 5
    condition:
      breeding_system: "outcross"
    action: "use_diverse_reference"
    reason: "异交物种 LD 衰减快，需要高密度参考面板或大样本量"
    params:
      reference_panel_priority: "high"
      reference_density: "high"
      min_reference_size: 500
      ld_decay_threshold: "short"
      imputation_strategy: "reference_based"
      fallback_strategy: "large_cohort_internal"

  - rule_id: "germ-selfing-002"
    priority: 5
    condition:
      breeding_system: "inbred"
    action: "beagle_sufficient"
    reason: "自交物种 LD 跨度大，Beagle 不依赖参考面板亦可获得良好填充精度"
    params:
      reference_panel_required: false
      imputation_method: "beagle_internal"
      expected_ld_span: "long"
      min_sample_size: 50
      accuracy_expectation: "high"
      population_internal_ld: true

  - rule_id: "germ-structured-003"
    priority: 6
    condition:
      population_structure: "strong"
    action: "stratify_before_imputation"
    reason: "强群体结构 → 按亚群分层填充，避免跨亚群错误填充"
    params:
      stratification_method: "pca_admixture"
      subpopulation_detection: true
      min_subpop_size: 20
      imputation_mode: "per_subpopulation"
      reference_panel_matching: "subpopulation_specific"
      cross_subpop_imputation: false

# ============================================================
# 决策节点 4: 后填充 QC
# ============================================================
post_imputation_qc:
  - rule_id: "postimp-standard-001"
    priority: 5
    condition:
      tool_used: ["beagle", "impute2", "minimac4"]
    action: "filter_by_r2_and_maf"
    params: {r2_min: 0.30, maf_min: 0.01}
    reason: "R² > 0.3 保留，MAF > 0.01"
    tool_id: "post-imputation-qc"

  - rule_id: "postimp-strict-002"
    priority: 4
    condition:
      downstream_analysis: "gwas"
    action: "strict_filter"
    params: {r2_min: 0.50, maf_min: 0.05}
    reason: "GWAS 下游 → 更严格的过滤，减少假阳性"

  - rule_id: "postimp-gs-003"
    priority: 4
    condition:
      downstream_analysis: "genomic_selection"
    action: "retain_more_markers"
    params: {r2_min: 0.30, maf_min: 0.01}
    reason: "基因组选择 → 保留更多标记，允许低 R² 标记"

# ============================================================
# 决策节点 5: 分阶段填充 (scaffold)
# ============================================================
phasing_strategy:
  - rule_id: "phase-beagle-convenience-001"
    priority: 5
    condition:
      imputation_tool_selected: "beagle"
    action: "beagle_integrated_phasing"
    reason: "Beagle 内置定相功能，无需额外步骤"
    params:
      phasing_method: "integrated"
      separate_phasing_step: false
      output_phased: true
      phase_accuracy_threshold: 0.95

  - rule_id: "phase-shapeit-impute2-002"
    priority: 4
    condition:
      imputation_tool_selected: "impute2"
      sample_count: ">= 100"
    action: "shapeit_prephasing"
    tool_id: "shapeit-phasing"
    reason: "IMPUTE2 需要预先定相，SHAPEIT 是标准前处理"
    params:
      phasing_method: "shapeit"
      input_format: "vcf"
      output_format: "hap"
      effective_population_size: 15000
      window_size: 0.5
      sparse_mcmc: true
      burn_in: 7
      main_iterations: 12

# ============================================================
# 回退规则
# ============================================================
fallback:
  - rule_id: "imp-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params:
      reason: "no_matching_rule"
      fallback_mode: "expert_notebook"
      collect_additional_info: true
      suggest_user_consultation: true

design_gates:
  - id: "imp-genotype-data"
    rule: "基因型填充需要原始基因型数据（VCF 或 PLINK 格式）"
    check: "has_genotype_data == true"
    severity: "block"
    on_fail: "没有基因型数据 → 无法做填充。填充的前提是有低密度基因型数据作为 anchor，然后用参考面板推断缺失的基因型。"
  - id: "imp-marker-density"
    rule: "低密度基因型标记数至少 100 个才能做有意义的填充"
    check: "snp_count >= 100"
    severity: "warn"
    on_fail: "标记数 < 100 → 整个基因组上的 anchor 点过少，填充精度极低。建议增加标记密度或使用更高密度的基因型芯片。"
  - id: "imp-reference-panel"
    rule: "使用参考面板填充时，参考面板应包含与研究群体遗传背景相似的单倍型"
    check: "reference_panel_available == true or imputation_tool == 'beagle'"
    severity: "warn"
    on_fail: "Beagle 可以在没有外部参考面板时进行填充（利用群体内部 LD），但填充精度受限于群体大小。使用 IMPUTE2/Minimac4 必须有外部参考。"
  - id: "imp-accuracy-validation"
    rule: "必须验证填充精度（如 masked validation 或 R² 指标）"
    check: "imputation_accuracy_validated == true"
    severity: "warn"
    on_fail: "未验证填充精度 → 无法评估填充后的基因型质量。推荐使用 masked validation 策略：随机屏蔽 5% 的已知高置信度位点，填充后比较。"
