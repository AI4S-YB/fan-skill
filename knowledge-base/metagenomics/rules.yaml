name: metagenomics
description: "Plant metagenomics — from raw reads to MAGs, taxonomic profiling, and functional annotation. Covers assembly (MEGAHIT/metaSPAdes), binning (MetaBAT2), quality control (CheckM), and plant microbiome analysis. Dual-mode B+C decision system."
triggers:
  - "metagenomics"
  - "metagenome"
  - "shotgun"
  - "taxonomic profiling"
  - "binning"
  - "mag"
  - "kraken"
  - "metaphlan"

inputs:
  - data_profile.json
  - params.yaml
  - sequencing_reads
  - sample_metadata

outputs:
  - mag_table
  - functional_annotation_table
  - taxonomic_profile_table
  - analysis_report

version: "1.0"
analysis: metagenomics

inputs_required:
  - data_profile.json
  - params.yaml
  - sequencing_reads
  - sample_metadata

# ============================================================
# Decision Node 1: Assembly Strategy
# ============================================================
assembly:
  - rule_id: "meta-megahit-standard-001"
    priority: 10
    condition:
      data_volume: ["medium", "large"]
    recommend: "megahit"
    reason: "中等-大数据量 → MEGAHIT高效"
    tool_id: "megahit"
    params:
      min_count: 2
      k_list: "21,33,55,77,99,127"
      preserv_temp: FALSE

  - rule_id: "meta-metaspades-sensitive-002"
    priority: 9
    condition:
      data_volume: "small"
    recommend: "metaspades"
    reason: "小数据量 → metaSPAdes更敏感"
    tool_id: "metaspades"
    params:
      meta: true
      k: "21,33,55,77,99,127"
      careful: true
      threads: 16
      memory: 32

  - rule_id: "meta-hybrid-assembly-003"
    priority: 11
    condition:
      has_long_reads: true
    recommend: "hybrid_assembly"
    reason: "有长读长 → 混合组装提升连续性"
    tool_id: "metaspades"
    params:
      meta: true
      nanopore: "{long_read_file}"
      k: "21,33,55,77"
      threads: 24
      memory: 64

# ============================================================
# Decision Node 2: Preprocessing / Quality Control
# ============================================================
preprocessing:
  - rule_id: "meta-fastp-default-001"
    priority: 10
    recommend: "fastp_trimming"
    reason: "fastp质控+去宿主"
    tool_id: "fastp"
    params:
      qualified_quality_phred: 20
      length_required: 50
      cut_front: true
      cut_tail: true
      detect_adapter_for_se: true
      thread: 8

  - rule_id: "meta-kneaddata-host-002"
    priority: 11
    condition:
      host_contamination: true
    recommend: "kneaddata_dehost"
    reason: "需去宿主污染 → KneadData比对宿主基因组"
    tool_id: "kneaddata"
    params:
      reference: "{host_reference_db}"
      threads: 12
      bowtie2_options: "--very-sensitive"
      remove_intermediate_output: true

# ============================================================
# Decision Node 3: Binning
# ============================================================
binning:
  - rule_id: "meta-metabat2-001"
    priority: 10
    recommend: "metabat2"
    reason: "MetaBAT2自动分箱"
    tool_id: "metabat2"
    params:
      min_contig: 1500
      sensitive: TRUE
      min_cv_sum: 1

  - rule_id: "meta-concoct-002"
    priority: 11
    condition:
      binning_method: "composition"
    recommend: "concoct"
    reason: "基于组成的分箱 → CONCOCT四核苷酸频率"
    tool_id: "concoct"
    params:
      chunk_length: 10000
      overlap_length: 0
      kmer_length: 4
      read_length: 100
      threads: 16

  - rule_id: "meta-maxbin-003"
    priority: 7
    condition:
      binning_method: "coverage"
    recommend: "maxbin2"
    reason: "基于覆盖度的分箱 → MaxBin2"
    tool_id: "maxbin2"
    params:
      min_contig_length: 1000
      max_iteration: 50
      prob_threshold: 0.9
      threads: 16

  - rule_id: "meta-das-tool-ensemble-004"
    priority: 11
    condition:
      binning_consensus: true
    recommend: "das_tool"
    reason: "多工具共识分箱 → DASTool整合结果"
    tool_id: "das_tool"
    params:
      score_threshold: 0.5
      duplicate_similarity: 0.99
      threads: 16

# ============================================================
# Decision Node 4: MAG Quality Assessment
# ============================================================
mag_qc:
  - rule_id: "meta-checkm-001"
    priority: 10
    recommend: "checkm_quality"
    reason: "CheckM评估MAG完整性和污染"
    tool_id: "checkm"
    params:
      completeness_threshold: 50
      contamination_threshold: 10
      extension: "fa"

  - rule_id: "meta-gtdbtk-002"
    priority: 11
    condition:
      mag_count: ">= 1"
      classification: true
    recommend: "gtdbtk_classify"
    reason: "GTDB-Tk物种分类"
    tool_id: "gtdbtk"
    params:
      workflow: "classify_wf"
      extension: "fa"
      cpus: 24
      memory: 64

# ============================================================
# Decision Node 5: Functional Annotation
# ============================================================
annotation:
  - rule_id: "meta-func-annotation-001"
    priority: 5
    recommend: "prokka_or_dram"
    reason: "MAG功能注释"
    tool_id: "dram"
    params:
      min_contig_length: 1000
      use_uniref: false
      threads: 16
      verbose: true

  - rule_id: "meta-eggnog-002"
    priority: 4
    condition:
      database: "eggnog"
    recommend: "eggnog_mapper"
    reason: "EggNOG-mapper COG/KEGG注释"
    tool_id: "eggnog_mapper"
    params:
      mode: "diamond"
      data_dir: "{eggnog_db_path}"
      cpu: 16
      annotate_hits_table: true
      go_evidence: "non-electronic"

  - rule_id: "meta-kegg-plant-003"
    priority: 4
    condition:
      focus: "plant_pathway"
    recommend: "kegg_decoder"
    reason: "植物相关通路 → KEGG-Decoder可视化"
    tool_id: "kegg_decoder"
    params:
      input_file: "{kegg_annotation_file}"
      output_file: "{output_prefix}_pathways.tsv"
      format: "heatmap"

# ============================================================
# Decision Node 6: Visualization
# ============================================================
visualization:
  - rule_id: "meta-vis-phyloseq-001"
    priority: 5
    recommend: "phyloseq_barplot"
    reason: "群落组成 → phyloseq柱状图+PCoA"
    tool_id: "phyloseq"
    params:
      plot_type: "barplot"
      top_n_taxa: 20
      color_palette: "Set2"
      pcoa_method: "bray"

# ============================================================
# Fallback
# ============================================================
fallback:
  - rule_id: "meta-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params:
      reason: "No matching rule found"
      suggestion: "Consult with bioinformatics expert for custom analysis"

design_gates:
  - id: "metag-negative-control"
    rule: "宏基因组测序需要阴性对照以评估试剂和环境背景污染"
    check: "has_negative_control == true"
    severity: "block"
    on_fail: "无阴性对照 → 无法区分真实微生物信号和试剂/环境 DNA 污染。宏基因组 shotgun 测序中 background DNA 是一个已知问题。"
  - id: "metag-host-removal"
    rule: "植物宏基因组必须去除宿主（植物）reads"
    check: "host_reads_removed == true"
    severity: "block"
    on_fail: "未去除宿主 reads → 植物 DNA 占 reads 的 50-99%，会严重干扰微生物基因组的组装和丰度估计。将 reads 比对到植物参考基因组，移除 mapping reads 后再进行下游分析。"
  - id: "metag-sequencing-depth"
    rule: "宏基因组 shotgun 测序需要足够的测序深度（推荐每样本 ≥ 5 Gb）"
    check: "sequencing_depth_gb >= 5"
    severity: "warn"
    on_fail: "测序深度不足 → 低丰度微生物可能被遗漏，基因组组装（MAGs）的完整性低。对于根际土壤宏基因组，推荐 ≥ 10 Gb 以捕获真菌和原生生物。"
  - id: "metag-database-plant-associated"
    rule: "分类注释时推荐使用包含植物相关微生物的数据库"
    check: "plant_associated_db_used == true"
    severity: "warn"
    on_fail: "通用数据库（如标准 Kraken2 数据库）可能缺少许多植物特异性微生物的参考基因组。考虑添加植物病原菌和共生菌的基因组到自定义数据库中。"
