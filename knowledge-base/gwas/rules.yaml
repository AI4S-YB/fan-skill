name: gwas
description: "Plant genome-wide association study — from genotype + phenotype to candidate genes. Covers PLINK QC, population structure correction, GAPIT (CMLM/FarmCPU), BLINK, and MET-GWAS for multi-environment trials. Uses a dual-mode decision system (rule matrix + expert notebook)."
triggers:
  - "gwas"
  - "genome-wide association"
  - "association mapping"
  - "manhattan plot"
  - "qq plot"
  - "blink"
  - "farmcpu"
  - "cmlm"

inputs:
  - data_profile.json
  - genotype_data
  - phenotype_data
  - species_info
  - params.yaml

outputs:
  - manhattan_plot
  - qq_plot
  - significant_snp_table
  - analysis_report

# ============================================================
# 实验设计门禁：在生成分析计划前自动检查
# ============================================================
design_gates:
  - id: "gwas-markers-minimum"
    rule: "至少 500 个标记才能做 GWAS"
    check: "snp_count >= 500"
    severity: "block"
    on_fail: "标记数 < 500 → 无法做全基因组关联。考虑候选基因关联分析。"
  - id: "gwas-samples-minimum"
    rule: "至少 100 个样本"
    check: "sample_count >= 100"
    severity: "warn"
    on_fail: "样本量 < 100 → 统计功效只能检测大效应位点。"
  - id: "gwas-numeric-phenotype"
    rule: "表型必须是数值型"
    check: "phenotype_is_numeric == true"
    severity: "block"

# GWAS 决策矩阵 — Rule 模式的决策规则
# 规则按优先级排序，多条同时命中时取 priority 最高的

version: "1.0"
analysis: gwas

inputs_required:
  - data_profile.json    # from inspect_data.sh
  - params.yaml          # user-provided parameters

# ============================================================
# 决策节点 1: 数据格式转换
# ============================================================
data_conversion:
  - rule_id: "fmt-bed-001"
    priority: 10
    condition:
      format: "bed"
    action: "skip_conversion"
    params:
      format_verified: true
      ready_for_analysis: true
    reason: "PLINK binary 格式可直接使用"

  - rule_id: "fmt-vcf-002"
    priority: 10
    condition:
      format: "vcf"
    action: "plink_make_bed"
    tool_id: "plink2-convert"
    command: "plink2 --vcf ${INPUT} --make-bed --out ${OUTPUT}"
    params:
      make_bed: true
      reference_allele: "major"
      allow_extra_chroms: true
      output_format: "bed"
    reason: "VCF 需要转换为 PLINK binary 格式"

  - rule_id: "fmt-hapmap-003"
    priority: 10
    condition:
      format: "hapmap"
    action: "gapit_import"
    tool_id: "gapit-cmlm"
    params:
      import_format: "HapMap"
      snp_imputation: false
      filter_heterozygous: true
    reason: "Hapmap 格式由 GAPIT 直接读取，不需要转换"

# ============================================================
# 决策节点 2: QC 策略
# ============================================================
qc_strategy:
  - rule_id: "qc-standard-001"
    priority: 5
    condition:
      snp_count: ">= 10000"
    action: "standard_qc"
    params:
      maf: 0.05
      geno: 0.1
      mind: 0.1
      hwe: 1e-6
    reason: "标准 QC 参数适用于中等密度以上标记"

  - rule_id: "qc-relaxed-002"
    priority: 5
    condition:
      snp_count: "< 10000"
    action: "relaxed_qc"
    params:
      maf: 0.01
      geno: 0.1
      mind: 0.1
      hwe: 1e-3
    reason: "标记数少时放宽 MAF 和 HWE 阈值，避免过度过滤"

  - rule_id: "qc-inbred-003"
    priority: 6
    condition:
      species_type: "inbred"
    action: "skip_hwe_filter"
    params:
      maf: 0.01
      geno: 0.1
      mind: 0.1
      hwe: null
      inbred_correction: true
    reason: "自交物种不符合 Hardy-Weinberg 平衡假设，跳过 HWE 过滤"

# ============================================================
# 决策节点 3: GWAS 方法选择 (核心)
# ============================================================
gwas_method:
  - rule_id: "gwas-large-bl-001"
    priority: 10
    condition:
      sample_count: ">= 500"
      snp_count: ">= 50000"
      genomic_inflation: "< 1.1"
    recommend: "blink"
    reason: "大样本高密度低分层 → BLINK 统计功效最高、速度最快"
    tool_id: "blink"
    params:
      maxLoop: 10
      PCA.total: 3
      LDRemove: "ON"
      permute: 0

  - rule_id: "gwas-stratified-fc-002"
    priority: 9
    condition:
      genomic_inflation: "> 1.05"
      sample_count: ">= 200"
      snp_count: ">= 1000"
    recommend: "farmcpu"
    reason: "群体分层显著 → FarmCPU 交替迭代有效控制假阳性"
    tool_id: "gapit-farmcpu"
    params:
      maxLoop: 10
      method.bin: "static"
      n.PC: 3
      maf.threshold: 0.01

  - rule_id: "gwas-small-inbred-cmlm-003"
    priority: 8
    condition:
      sample_count: "< 200"
      species_type: "inbred"
    recommend: "gapit-cmlm"
    reason: "小样本近交物种 → CMLM + K 矩阵控制亲缘关系最稳健"
    tool_id: "gapit-cmlm"
    params:
      model: "CMLM"
      n.PC: 0
      kinship.algorithm: "VanRaden"
      maf.threshold: 0.05

  - rule_id: "gwas-small-outcross-cmlm-004"
    priority: 8
    condition:
      sample_count: "< 200"
      species_type: "outcross"
    recommend: "gapit-cmlm"
    reason: "小样本异交物种 → CMLM + K 矩阵也适用，加 PCA 协变量"
    tool_id: "gapit-cmlm"
    params:
      model: "CMLM"
      n.PC: 3
      kinship.algorithm: "VanRaden"
      maf.threshold: 0.05
      use_pca: true

  - rule_id: "gwas-multienv-met-005"
    priority: 10
    condition:
      env_count: "> 1"
    recommend: "met-gwas"
    reason: "多环境数据 → MET-GWAS 可分离 G×E 效应"
    tool_id: "met-gwas"
    params:
      model: "multi_env"
      env_factor: true
      gxe_analysis: true
      stability_index: "BLUP"
      heritability_method: "REML"

  - rule_id: "gwas-tetraploid-006"
    priority: 10
    condition:
      ploidy: "autotetraploid"
    recommend: "gwaspoly"
    reason: "同源四倍体需剂量感知方法"
    tool_id: "gwaspoly"
    params:
      ploidy: 4
      dosage_model: "additive"
      allele_dosage: true
      kinship_method: "VanRaden_poly"
      maf.threshold: 0.01

  - rule_id: "gwas-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params:
      reason: "no_matching_rule"
    reason: "数据特征不在预设规则内，切换到 expert 推理"

# ============================================================
# 决策节点 4: 协变量策略
# ============================================================
covariate_strategy:
  - rule_id: "cov-pc-only-001"
    priority: 5
    condition:
      species_type: "outcross"
      genomic_inflation: "< 1.1"
    recommend: "pca_only"
    pc_count: 3
    params:
      covariate_type: "PCA"
      n_components: 3
      include_kinship: false
      pc_significance: "Tracy-Widom"
    reason: "异交物种低分层 → PCA 3 个主成分足够"

  - rule_id: "cov-k-only-002"
    priority: 5
    condition:
      species_type: "inbred"
      sample_count: "< 300"
    recommend: "k_matrix_only"
    params:
      covariate_type: "kinship"
      kinship_method: "VanRaden"
      include_pca: false
      k_normalization: true
    reason: "近交物种小样本 → K 矩阵比 PCA 更有效"

  - rule_id: "cov-pc-plus-k-003"
    priority: 6
    condition:
      genomic_inflation: "> 1.1"
    recommend: "pca_plus_k"
    pc_count: 5
    params:
      covariate_type: "PCA_plus_kinship"
      n_components: 5
      kinship_method: "VanRaden"
      pc_selection: "parallel_analysis"
      control_stratification: true
    reason: "群体分层 → PCA + K 矩阵联合控制"

  - rule_id: "cov-subgenome-004"
    priority: 7
    condition:
      ploidy: "allopolyploid"
    recommend: "per_subgenome_pca"
    params:
      covariate_type: "subgenome_PCA"
      subgenome_analysis: true
      separate_kinship: true
      subgenome_count: 2
      homoeolog_filtering: true
    reason: "异源多倍体 → 每个亚基因组独立 PCA"

# ============================================================
# 决策节点 5: 显著性阈值
# ============================================================
significance_threshold:
  - rule_id: "sig-bonferroni-standard-001"
    priority: 5
    condition:
      method: ["blink", "farmcpu"]
    threshold: "5e-8"
    params:
      threshold_type: "bonferroni"
      alpha: 0.05
      effective_tests: 1000000
      correction_method: "standard"
    reason: "标准 Bonferroni 校正 (≈ 1M 独立检验)"

  - rule_id: "sig-bonferroni-relaxed-002"
    priority: 6
    condition:
      snp_count: "< 10000"
    threshold_formula: "0.05 / snp_count"
    params:
      threshold_type: "bonferroni_relaxed"
      alpha: 0.05
      correction_method: "sample_size_adjusted"
      min_threshold: 1e-6
      max_threshold: 5e-4
    reason: "标记少时用 0.05/nSNP 作为阈值"

  - rule_id: "sig-suggestive-003"
    priority: 3
    threshold: "1e-5"
    label: "suggestive"
    params:
      threshold_type: "suggestive"
      p_value: 1e-5
      purpose: "candidate_region_identification"
      follow_up_required: true
      validation_needed: true
    reason: "建议性阈值 (1e-5)，用于标记潜在感兴趣区域"
