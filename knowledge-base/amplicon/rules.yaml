name: amplicon
description: "Plant amplicon sequencing analysis — 16S rRNA, ITS, and other marker gene surveys for plant-associated microbiomes. Covers DADA2/QIIME2 denoising, taxonomy assignment (SILVA/UNITE), diversity analysis, and differential abundance testing (ANCOM-BC). Uses a dual-mode decision system (rule matrix + expert notebook)."
triggers:
  - "amplicon"
  - "16s"
  - "its"
  - "18s"
  - "amplicon sequencing"
  - "metabarcoding"
  - "dada2"
  - "qiime2"

inputs:
  - sequencing_reads
  - metadata.csv
  - reference_database

outputs:
  - analysis_report
  - figures
  - result_tables

version: "1.0"
analysis: amplicon_sequencing

denoising:
  - rule_id: "amp-dada2-001"
    priority: 10
    recommend: "dada2"
    reason: "DADA2 → ASV水平分辨率"
    tool_id: "dada2"
  - rule_id: "amp-deblur-002"
    priority: 8
    recommend: "qiime2_deblur"
    reason: "QIIME2 Deblur → 固定长度的ASV"

taxonomy:
  - rule_id: "amp-silva-16s-001"
    priority: 10
    condition: { target: "16S" }
    recommend: "silva_138"
    reason: "16S → SILVA数据库"
    tool_id: "taxonomy"
  - rule_id: "amp-unite-its-002"
    priority: 10
    condition: { target: "ITS" }
    recommend: "unite"
    reason: "ITS → UNITE真菌数据库"

diversity:
  - rule_id: "amp-core-metrics-001"
    priority: 10
    recommend: "core_diversity_metrics"
    reason: "α多样性(Shannon/Faith) + β多样性(Bray-Curtis/UniFrac)"

diff_abundance:
  - rule_id: "amp-ancom-001"
    priority: 10
    condition: { group_count: ">= 2" }
    recommend: "ancom_bc"
    reason: "ANCOM-BC差异丰度分析"

fallback:
  - rule_id: "amp-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
