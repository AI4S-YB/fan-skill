name: comparative
description: "Plant comparative genomics — synteny (MCScanX), Ks analysis, gene family identification (OrthoFinder/HMM), selection pressure (PAML dN/dS), and species/gene tree reconciliation. Dual-mode B+C decision system."
triggers:
  - "comparative genomics"
  - "ortholog"
  - "synteny"
  - "collinearity"
  - "gene family"
  - "phylogenomics"
  - "mcscanx"
  - "orthofinder"

inputs:
  - data_profile.json
  - genome_sequences
  - gff_annotation
  - params.yaml

outputs:
  - synteny_blocks
  - ks_values_table
  - orthogroups_table
  - selection_pressure_table
  - analysis_report

version: "1.0"
analysis: comparative_genomics

inputs_required:
  - data_profile.json
  - genome_sequences
  - gff_annotation
  - params.yaml

synteny_analysis:
  - rule_id: "syn-intraspecies-001"
    priority: 10
    condition:
      comparison_type: "intraspecies"
    recommend: "mcsanx_self"
    reason: "种内共线性 → MCScanX 自比对，识别基因组加倍事件"
    tool_id: "mcsanx"
    params:
      gap_penalty: -25
      min_align: 5

  - rule_id: "syn-interspecies-002"
    priority: 10
    condition:
      comparison_type: "interspecies"
    recommend: "mcsanx_pairwise"
    reason: "种间共线性 → MCScanX 双向比对"
    tool_id: "mcsanx"
    params:
      gap_penalty: -25
      match_score: 50
      min_align: 5
      evalue: 1e-5

  - rule_id: "syn-multi-species-003"
    priority: 9
    condition:
      species_count: ">= 3"
    recommend: "jcvi_mcscan_python"
    reason: "≥3 物种用 JCVI 版本的 MCScan (Python) 更方便多物种比较"
    tool_id: "mcsanx"
    params:
      min_synteny_blocks: 5
      max_gaps: 20
      dist_cutoff: 40

  - rule_id: "syn-polyploid-004"
    priority: 10
    condition:
      ploidy: ["allopolyploid", "autopolyploid"]
    recommend: "mcsanx_subgenome_aware"
    reason: "多倍体 → 亚基因组感知的共线性分析"
    tool_id: "mcsanx"
    params:
      subgenome_aware: true
      homeolog_identification: true
      max_homeolog_divergence: 0.3

ks_analysis:
  - rule_id: "ks-whole-genome-duplication-001"
    priority: 10
    condition:
      analysis_goal: "wgd_dating"
    recommend: "wgdi_ks_peak"
    reason: "全基因组加倍时间估计 → WGDI 或 KaKs_Calculator 的峰值拟合"
    tool_id: "ks-analysis"
    params:
      ks_method: "yn00"
      ks_range: [0, 3]
      peak_fitting: "gaussian"

  - rule_id: "ks-gene-pair-002"
    priority: 8
    condition:
      analysis_goal: "gene_pair_age"
    recommend: "kaks_calculator_yn00"
    reason: "单对基因的 Ks → KaKs_Calculator yn00 方法"
    tool_id: "ks-analysis"
    params:
      method: "yn00"
      model: "Yang-Nielsen"

  - rule_id: "ks-large-scale-003"
    priority: 7
    condition:
      gene_pair_count: ">= 1000"
    recommend: "paml_codeml_batch"
    reason: "大量基因对 → PAML codeml 批量模式"
    tool_id: "ks-analysis"
    params:
      batch_size: 100
      threads: 8
      codeml_model: "0"

gene_family:
  - rule_id: "gf-orthofinder-standard-001"
    priority: 10
    condition:
      species_count: ">= 2"
    recommend: "orthofinder"
    reason: "多物种基因家族 → OrthoFinder 是金标准"
    tool_id: "orthofinder"
    params:
      inflation: 1.5
      msa: TRUE

  - rule_id: "gf-single-species-hmm-002"
    priority: 8
    condition:
      species_count: 1
      domain_known: true
    recommend: "hmm_search"
    reason: "单物种已知结构域家族 → HMMER hmmsearch"
    tool_id: "gene-family"
    params:
      evalue: 1e-5
      domE: 1e-5
      incdomE: 1e-5

  - rule_id: "gf-single-species-blast-003"
    priority: 7
    condition:
      species_count: 1
      domain_known: false
    recommend: "blast_all_vs_all_cluster"
    reason: "单物种未知结构域 → BLAST all-vs-all + MCL 聚类"
    tool_id: "gene-family"
    params:
      evalue: 1e-5
      coverage_min: 0.5
      mcl_inflation: 1.5

  - rule_id: "gf-nbs-lrr-plant-004"
    priority: 9
    condition:
      family_type: "nbs_lrr"
    recommend: "nbs_lrr_specific_pipeline"
    reason: "植物 NBS-LRR 抗病基因家族 → 专用 pipeline (NLR-Annotator/RGAugury)"
    tool_id: "gene-family"
    params:
      tools: ["NLR-Annotator", "RGAugury"]
      min_nbs_domain: 1

selection_pressure:
  - rule_id: "sel-branch-site-001"
    priority: 10
    condition:
      analysis_type: "positive_selection_branch"
    recommend: "paml_branch_site_model"
    reason: "检测特定支系的正选择 → PAML branch-site model (Model A vs null)"
    tool_id: "selection-pressure"
    params:
      model: "branch-site"
      null_model: "MA"
      alternative_model: "MA1"
      lrt_threshold: 0.05

  - rule_id: "sel-site-model-002"
    priority: 9
    condition:
      analysis_type: "positive_selection_sites"
    recommend: "paml_site_model"
    reason: "检测全基因范围内的正选择位点 → PAML site model (M7 vs M8)"
    tool_id: "selection-pressure"
    params:
      null_model: "M7"
      alternative_model: "M8"
      bayes_empirical_bayes: true

  - rule_id: "sel-branch-model-003"
    priority: 8
    condition:
      analysis_type: "divergent_selection"
    recommend: "paml_branch_model"
    reason: "检测支系间选择压力差异 → PAML branch model (free-ratio)"
    tool_id: "selection-pressure"
    params:
      model: "branch"
      free_ratio: true
      nst: 1

tree_reconciliation:
  - rule_id: "tree-species-tree-001"
    priority: 5
    condition:
      has_reference_tree: true
    recommend: "use_reference_species_tree"
    reason: "有参考物种树时优先使用"
    params:
      tree_format: "newick"
      branch_support_threshold: 0.7

  - rule_id: "tree-infer-from-single-copy-002"
    priority: 5
    condition:
      has_reference_tree: false
    recommend: "infer_from_single_copy_orthologs"
    reason: "从单拷贝直系同源基因推断物种树"
    params:
      min_orthologs: 50
      concatenation_method: "supermatrix"
      tree_inference: "iqtree"

fallback:
  - rule_id: "comp-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params:
      reason: "no_matching_rule"

design_gates:
  - id: "comp-annotation-required"
    rule: "比较基因组分析需要基因注释文件 (GFF3/GTF)"
    check: "has_gene_annotation == true"
    severity: "block"
    on_fail: "仅有基因组 FASTA 序列不够，需要基因位置信息 (GFF3/GTF)。共线性分析、Ks 分析、基因家族鉴定都需要知道基因在哪。如果基因组没有官方注释，可以用 BRAKER3 或 GeMoMa 做从头注释。"
  - id: "comp-cds-required"
    rule: "Ks 和 dN/dS 分析需要 CDS 序列"
    check: "has_cds_sequences == true"
    severity: "block"
    on_fail: "Ks 和 dN/dS 分析需要蛋白质编码序列 (CDS) 进行密码子比对。仅有蛋白序列或仅有基因组序列都不够。"
  - id: "comp-minimum-species"
    rule: "比较基因组分析至少需要 2 个物种的基因组"
    check: "species_count >= 2"
    severity: "block"
    on_fail: "单一物种无法做比较基因组分析。如果只有一个基因组，只能做基因组结构和组成分析（重复序列含量、基因密度、GC 含量等），不是比较基因组学。"
  - id: "comp-polyploid-subgenome"
    rule: "多倍体物种的比较分析需要亚基因组分离"
    check: "subgenome_separated == true or ploidy <= 2"
    severity: "warn"
    on_fail: "多倍体物种中不同亚基因组的进化历史不同，合并分析会掩盖亚基因组特异的分化模式。建议分离亚基因组后分别比较。"
