# 比较基因组学决策矩阵测试用例
# 每条 rule 至少一个 case 能触发

test_cases:
  # --- 共线性分析 ---
  - name: "intraspecies_synteny"
    rule_section: synteny_analysis
    input_profile:
      comparison_type: "intraspecies"
    expected:
      rule_id: "syn-intraspecies-001"
      recommend: "mcsanx_self"

  - name: "interspecies_synteny"
    rule_section: synteny_analysis
    input_profile:
      comparison_type: "interspecies"
    expected:
      rule_id: "syn-interspecies-002"
      recommend: "mcsanx_pairwise"

  - name: "multi_species_synteny"
    rule_section: synteny_analysis
    input_profile:
      species_count: 5
    expected:
      rule_id: "syn-multi-species-003"
      recommend: "jcvi_mcscan_python"

  - name: "allopolyploid_synteny"
    rule_section: synteny_analysis
    input_profile:
      ploidy: "allopolyploid"
    expected:
      rule_id: "syn-polyploid-004"
      recommend: "mcsanx_subgenome_aware"

  # --- Ks 分析 ---
  - name: "wgd_dating_ks"
    rule_section: ks_analysis
    input_profile:
      analysis_goal: "wgd_dating"
    expected:
      rule_id: "ks-whole-genome-duplication-001"
      recommend: "wgdi_ks_peak"

  - name: "gene_pair_age_ks"
    rule_section: ks_analysis
    input_profile:
      analysis_goal: "gene_pair_age"
    expected:
      rule_id: "ks-gene-pair-002"
      recommend: "kaks_calculator_yn00"

  - name: "large_scale_ks"
    rule_section: ks_analysis
    input_profile:
      gene_pair_count: 5000
    expected:
      rule_id: "ks-large-scale-003"
      recommend: "paml_codeml_batch"

  # --- 基因家族 ---
  - name: "multispecies_orthofinder"
    rule_section: gene_family
    input_profile:
      species_count: 4
    expected:
      rule_id: "gf-orthofinder-standard-001"
      recommend: "orthofinder"

  - name: "single_species_hmm_known_domain"
    rule_section: gene_family
    input_profile:
      species_count: 1
      domain_known: true
    expected:
      rule_id: "gf-single-species-hmm-002"
      recommend: "hmm_search"

  - name: "single_species_blast_unknown_domain"
    rule_section: gene_family
    input_profile:
      species_count: 1
      domain_known: false
    expected:
      rule_id: "gf-single-species-blast-003"
      recommend: "blast_all_vs_all_cluster"

  - name: "nbs_lrr_resistance_genes"
    rule_section: gene_family
    input_profile:
      family_type: "nbs_lrr"
    expected:
      rule_id: "gf-nbs-lrr-plant-004"
      recommend: "nbs_lrr_specific_pipeline"

  # --- 选择压力 ---
  - name: "positive_selection_branch"
    rule_section: selection_pressure
    input_profile:
      analysis_type: "positive_selection_branch"
    expected:
      rule_id: "sel-branch-site-001"
      recommend: "paml_branch_site_model"

  - name: "positive_selection_sites"
    rule_section: selection_pressure
    input_profile:
      analysis_type: "positive_selection_sites"
    expected:
      rule_id: "sel-site-model-002"
      recommend: "paml_site_model"

  - name: "divergent_selection"
    rule_section: selection_pressure
    input_profile:
      analysis_type: "divergent_selection"
    expected:
      rule_id: "sel-branch-model-003"
      recommend: "paml_branch_model"

  # --- 物种树 ---
  - name: "has_reference_tree"
    rule_section: tree_reconciliation
    input_profile:
      has_reference_tree: true
    expected:
      rule_id: "tree-species-tree-001"
      recommend: "use_reference_species_tree"

  - name: "infer_from_orthologs"
    rule_section: tree_reconciliation
    input_profile:
      has_reference_tree: false
    expected:
      rule_id: "tree-infer-from-single-copy-002"
      recommend: "infer_from_single_copy_orthologs"
