name: variant-calling
description: "Plant variant discovery from resequencing data — FASTQ to VCF. Covers BWA-MEM/minimap2 alignment, GATK/bcftools/DeepVariant calling, hard filtering/VQSR, and VCF QC. Dual-mode B+C."
triggers:
  - "variant calling"
  - "snp calling"
  - "indel calling"
  - "gatk"
  - "bcftools"
  - "freebayes"
  - "deepvariant"
  - "variant filtration"

inputs:
  - data_profile.json
  - fastq_files
  - reference_genome
  - params.yaml

outputs:
  - vcf_file
  - variant_stats
  - qc_report
  - analysis_report

# Variant Calling 决策矩阵 — Rule 模式的决策规则
# 规则按优先级排序，多条同时命中时取 priority 最高的

version: "1.0"
analysis: variant_calling

inputs_required:
  - data_profile.json
  - fastq_files
  - reference_genome
  - params.yaml

# ============================================================
# 决策节点 1: 序列比对
# ============================================================
alignment:
  - rule_id: "aln-bwa-illumina-001"
    priority: 10
    condition:
      sequencing_platform: "illumina"
    recommend: "bwa_mem"
    reason: "Illumina 短读长 → BWA-MEM 标准选择"
    tool_id: "bwa-mem"

  - rule_id: "aln-minimap2-long-002"
    priority: 10
    condition:
      sequencing_platform: ["pacbio", "ont"]
    recommend: "minimap2"
    reason: "长读长 → minimap2 优化"
    tool_id: "bwa-mem"

# ============================================================
# 决策节点 2: 变异检测方法
# ============================================================
variant_caller:
  - rule_id: "vc-gatk-gvcf-001"
    priority: 10
    condition:
      sample_count: ">= 10"
      species_type: "diploid"
    recommend: "gatk_haplotypecaller_gvcf"
    reason: "≥10样本二倍体 → GATK GVCF joint-calling"
    tool_id: "gatk-haplotype"

  - rule_id: "vc-bcftools-small-002"
    priority: 9
    condition:
      sample_count: "< 10"
    recommend: "bcftools_mpileup"
    reason: "<10样本 → bcftools mpileup 更简单直接"
    tool_id: "bcftools"

  - rule_id: "vc-deepvariant-003"
    priority: 8
    condition:
      sequencing_platform: ["pacbio", "ont"]
    recommend: "deepvariant"
    reason: "长读长 → DeepVariant 性能好"
    tool_id: "deepvariant"

  - rule_id: "vc-polyploid-004"
    priority: 9
    condition:
      ploidy: ["allopolyploid", "autopolyploid"]
    recommend: "gatk_polyploid_or_freebayes"
    reason: "多倍体 → GATK 或 freebayes polyploid 模式"
    tool_id: "gatk-haplotype"

# ============================================================
# 决策节点 3: 变异过滤
# ============================================================
variant_filtering:
  - rule_id: "vf-hard-filter-001"
    priority: 10
    condition:
      sample_count: "< 30"
    recommend: "hard_filtering"
    reason: "<30样本 → VQSR 需要大量样本，硬过滤更合适"
    tool_id: "vcf-qc"

  - rule_id: "vf-vqsr-002"
    priority: 10
    condition:
      sample_count: ">= 30"
      has_known_sites: true
    recommend: "vqsr"
    reason: "≥30样本 + 已知位点 → VQSR 比硬过滤更准确"
    tool_id: "vcf-qc"

  - rule_id: "vf-hard-filter-no-known-003"
    priority: 10
    condition:
      sample_count: ">= 30"
      has_known_sites: false
    recommend: "hard_filtering"
    reason: "≥30样本但无已知位点 → 无法运行 VQSR，使用硬过滤"
    tool_id: "vcf-qc"

# ============================================================
# 决策节点 4: VCF 质控与可视化
# ============================================================
vcf_qc:
  - rule_id: "qc-titv-check-001"
    priority: 10
    condition:
      species_type: "diploid"
    recommend: "standard_qc_metrics"
    reason: "二倍体 → 标准 QC 指标 (Ti/Tv, 缺失率, 杂合度)"
    tool_id: "visualization"

  - rule_id: "qc-polyploid-check-002"
    priority: 10
    condition:
      ploidy: ["allopolyploid", "autopolyploid"]
    recommend: "polyploid_qc_metrics"
    reason: "多倍体 → 放宽 Ti/Tv 期望，注意亚基因组分离"
    tool_id: "visualization"

# ============================================================
# Fallback: 无规则匹配
# ============================================================
fallback:
  - rule_id: "vc-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    reason: "数据特征不在预设规则内，切换到 expert 推理"
