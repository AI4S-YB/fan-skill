name: genome-assembly
description: "Plant genome assembly pipeline. Covers long-read assembly with hifiasm (PacBio HiFi) and Flye (ONT), hybrid assembly, polishing with Medaka/gcpp, Hi-C scaffolding, quality assessment with BUSCO and Merqury, and visualization."
triggers:
  - "genome assembly"
  - "de novo assembly"
  - "contig"
  - "scaffold"
  - "hifiasm"
  - "canu"
  - "flye"
  - "hifi"

inputs:
  - sequencing_reads
  - read_type
  - estimated_genome_size

outputs:
  - assembly_fasta
  - assembly_stats
  - busco_report
  - analysis_report

version: "1.0"
analysis: genome_assembly
assembler:
  - rule_id: "asm-hifiasm-hifi-001"
    priority: 10
    condition: { sequencing_type: "pacbio_hifi" }
    recommend: "hifiasm"
    reason: "PacBio HiFi -> hifiasm optimal"
    tool_id: "hifiasm"
  - rule_id: "asm-flye-ont-002"
    priority: 10
    condition: { sequencing_type: "ont" }
    recommend: "flye"
    reason: "ONT -> Flye optimized"
    tool_id: "flye"
  - rule_id: "asm-hybrid-003"
    priority: 9
    condition: { has_short_reads: true, has_long_reads: true }
    recommend: "hybrid_assembly"
    reason: "Long+short reads -> hybrid assembly for improved accuracy"
polishing:
  - rule_id: "pol-medaka-ont-001"
    priority: 10
    condition: { sequencing_type: "ont" }
    recommend: "medaka"
    tool_id: "polishing"
  - rule_id: "pol-gcpp-hifi-002"
    priority: 10
    condition: { sequencing_type: "pacbio_hifi" }
    recommend: "gcpp"
    tool_id: "polishing"
qc:
  - rule_id: "qc-busco-merqury-001"
    priority: 10
    recommend: "busco_and_merqury"
    reason: "BUSCO completeness + Merqury k-mer evaluation"
    tool_id: "qc"
scaffolding:
  - rule_id: "scaf-hic-001"
    priority: 5
    condition: { has_hic_data: true }
    recommend: "yahs_or_salsa_hic"
    reason: "Has Hi-C -> chromosome-level scaffolding"
    tool_id: "scaffolding"
fallback:
  - rule_id: "asm-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
