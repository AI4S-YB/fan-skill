name: proteomics
description: "Plant proteomics analysis — from raw MS spectra to differential protein abundance, PPI networks, and PTM analysis. Covers DDA (MaxQuant) and DIA (DIA-NN) workflows, limma-based differential analysis, STRING plant PPI, and phosphorylation analysis. Dual-mode B+C decision system."
triggers:
  - "proteomics"
  - "protein"
  - "mass spectrometry"
  - "maxquant"
  - "dia-nn"
  - "fragpipe"
  - "quantitative proteomics"
  - "ptm"

inputs:
  - data_profile.json
  - params.yaml
  - raw_spectra
  - sample_metadata
  - experimental_design

outputs:
  - protein_quantification_table
  - differential_proteins_table
  - ppi_network
  - analysis_report

version: "1.0"
analysis: proteomics

inputs_required:
  - data_profile.json
  - params.yaml
  - raw_spectra
  - sample_metadata
  - experimental_design

# ============================================================
# Decision Node 1: Quantification Strategy
# ============================================================
quantification:
  - rule_id: "prot-maxquant-dda-001"
    priority: 10
    condition:
      acquisition: "dda"
    recommend: "maxquant"
    reason: "DDA → MaxQuant LFQ"
    tool_id: "maxquant"

  - rule_id: "prot-diann-dia-002"
    priority: 10
    condition:
      acquisition: "dia"
    recommend: "diann"
    reason: "DIA → DIA-NN"
    tool_id: "diann"

  - rule_id: "prot-tmt-quant-003"
    priority: 9
    condition:
      acquisition: "tmt"
    recommend: "maxquant_tmt"
    reason: "TMT标记定量 → MaxQuant TMT模式"

  - rule_id: "prot-spectronaut-dia-004"
    priority: 11
    condition:
      acquisition: "dia"
      prefer_gui: true
    recommend: "spectronaut"
    reason: "DIA且有商业许可 → Spectronaut"

# ============================================================
# Decision Node 2: Differential Analysis
# ============================================================
diff_analysis:
  - rule_id: "prot-limma-001"
    priority: 10
    condition:
      rep_count: ">= 3"
    recommend: "limma_diff_proteins"
    tool_id: "diff-analysis"

  - rule_id: "prot-ttest-002"
    priority: 8
    condition:
      rep_count: "< 3"
    recommend: "ttest_with_warning"
    reason: "重复<3 → t检验但功效极低"

  - rule_id: "prot-msstats-003"
    priority: 11
    condition:
      has_fractionation: true
    recommend: "msstats"
    reason: "有分级分离数据 → MSstats建模"

# ============================================================
# Decision Node 3: PPI Network
# ============================================================
ppi_network:
  - rule_id: "prot-string-plant-001"
    priority: 5
    recommend: "string_db_plant"
    reason: "STRING DB植物PPI"
    tool_id: "ppi-network"

  - rule_id: "prot-cytoscape-002"
    priority: 6
    condition:
      has_custom_network: true
    recommend: "cytoscape_viz"
    reason: "自定义网络 → Cytoscape可视化"

# ============================================================
# Decision Node 4: PTM Analysis
# ============================================================
ptm:
  - rule_id: "prot-ptm-motif-001"
    priority: 5
    condition:
      has_ptm_data: true
    recommend: "motif_x_analysis"
    reason: "PTM数据 → Motif-x激酶基序分析"
    tool_id: "ptm-analysis"

  - rule_id: "prot-phospho-enrich-002"
    priority: 6
    condition:
      ptm_type: "phosphorylation"
    recommend: "kinase_enrichment"
    reason: "磷酸化 → 激酶富集分析"

  - rule_id: "prot-ptm-nomod-003"
    priority: 4
    condition:
      has_ptm_data: false
    recommend: "skip_ptm"
    reason: "无PTM数据 → 跳过PTM分析"

# ============================================================
# Decision Node 5: Visualization
# ============================================================
visualization:
  - rule_id: "prot-vis-volcano-001"
    priority: 5
    recommend: "volcano_heatmap"
    reason: "火山图+热图 → 差异蛋白展示"
    tool_id: "visualization"

  - rule_id: "prot-vis-ppi-002"
    priority: 6
    condition:
      has_ppi: true
    recommend: "ppi_network_viz"
    reason: "PPI网络 → STRING/Cytoscape网络图"

# ============================================================
# Fallback
# ============================================================
fallback:
  - rule_id: "prot-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"

design_gates:
  - id: "prot-extraction-method"
    rule: "蛋白质组学需要适合植物组织的蛋白提取方法（植物细胞壁和多酚是主要挑战）"
    check: "extraction_method_plant_appropriate == true"
    severity: "block"
    on_fail: "植物组织（特别是叶片和种子）含有大量细胞壁多糖、多酚和次生代谢物，会干扰蛋白提取。标准动物组织的提取方法通常不适用。推荐使用 TCA/丙酮沉淀或酚提取方法去除干扰物。"
  - id: "prot-fdr-control"
    rule: "肽段和蛋白鉴定必须控制 FDR < 1%（常用 target-decoy 策略）"
    check: "fdr_controlled == true and fdr_level <= 0.01"
    severity: "block"
    on_fail: "FDR 未控制或 > 1% → 蛋白鉴定列表中含有大量假阳性。所有主流搜库工具（MaxQuant、FragPipe、Proteome Discoverer）都内置了 target-decoy FDR 估计。"
  - id: "prot-replicates"
    rule: "差异蛋白分析每组至少 3 个生物学重复"
    check: "replicates_per_group >= 3"
    severity: "warn"
    on_fail: "每组 < 3 个重复 → DDA 模式下 missing values 普遍（10-30%），低重复数使统计功效很低。DIA 模式下 missing values 较少（< 5%），但 3 个重复仍是共识最低标准。"
  - id: "prot-protein-database"
    rule: "非模式物种应使用样本特异性蛋白库（来自 RNA-seq 或基因组注释）"
    check: "protein_database_appropriate == true"
    severity: "warn"
    on_fail: "仅用近缘物种的参考蛋白质组 → 会遗漏物种特异性蛋白，鉴定数量大幅减少。推荐用同物种的 RNA-seq 翻译蛋白库或基因组注释蛋白集。"
