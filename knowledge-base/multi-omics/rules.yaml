name: multi-omics
description: "Plant multi-omics integration — transcriptomics, proteomics, metabolomics, epigenomics. Covers MOFA2 (unsupervised factor analysis), DIABLO (supervised classification), mixOmics PLS/sPLS (pairwise), data preprocessing, factor interpretation, and publication-quality visualization. Tailored for plant-specific challenges: polyploid subgenome handling, tissue/developmental stage integration, and non-model species strategies."
triggers:
  - "multi-omics"
  - "integration"
  - "multi-omics integration"
  - "mofa"
  - "somics"
  - "mixomics"
  - "dimm"
  - "data integration"

inputs:
  - omics_datasets
  - sample_mapping
  - experimental_design

outputs:
  - integrated_factors
  - cross_omics_correlation_table
  - factor_interpretation
  - analysis_report

version: "1.0"
analysis: multi_omics_integration

integration_method:
  - rule_id: "mo-mofa-unsupervised-001"
    priority: 10
    condition:
      analysis_goal: ["exploratory", "dimension_reduction"]
    recommend: "mofa2"
    reason: "无监督探索 → MOFA2 从多组学数据中学习潜在因子"
    tool_id: "mofa"
    params:
      n_factors: 10
      convergence_mode: "fast"
      scale_views: TRUE
  - rule_id: "mo-diablo-supervised-002"
    priority: 10
    condition:
      analysis_goal: ["classification", "discrimination"]
      has_class_labels: true
    recommend: "diablo"
    reason: "有监督分类 → DIABLO 最大化类别间的组学差异"
    tool_id: "diablo"
    params:
      n_comp: 2
      keepX: "auto"
      design: "full"
  - rule_id: "mo-mixomics-pairwise-003"
    priority: 8
    condition:
      omics_count: "2"
    recommend: "mixomics_pls"
    reason: "两组学 → mixOmics PLS/sPLS 简单直接"
    tool_id: "mixomics"
    params:
      n_comp: 2
      mode: "canonical"
      keepX: "auto"
      cross_validation: "Mfold"

data_preprocessing:
  - rule_id: "dp-filter-common-samples-001"
    priority: 10
    action: "filter_to_common_samples"
    reason: "仅保留所有组学共有的样本"
    params:
      min_common_samples: 5
      allow_partial_match: false
      sample_id_mapping: "strict"
  - rule_id: "dp-normalize-per-omics-002"
    priority: 10
    action: "normalize_within_each_omics"
    reason: "每个组学内部单独归一化"
    params:
      transcriptomics: "TPM"
      proteomics: "median_normalization"
      metabolomics: "PQN"
      epigenomics: "RPKM"
      log_transform: true
      scale: "center_scale"

factor_interpretation:
  - rule_id: "fi-variance-explained-001"
    priority: 5
    condition:
      method: "mofa2"
    action: "check_factor_variance_and_top_features"
    tool_id: "factor-analysis"
    params:
      variance_threshold: 0.01
      top_features: 50
      significance_test: "permutation"
      n_permutations: 1000

fallback:
  - rule_id: "mo-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
    params:
      reason: "no_matching_rule"

design_gates:
  - id: "multi-matched-samples"
    rule: "多组学整合需要同一批样本或配对样本的不同组学数据"
    check: "samples_matched_across_omics == true"
    severity: "block"
    on_fail: "不同组学数据来自不同样本 → 无法区分分子关联和样本间差异。多组学整合的核心假设是不同层次的分子数据反映同一个体的生物学状态。"
  - id: "multi-individual-qc"
    rule: "每个单独组学层必须在整合前通过各自的质量控制"
    check: "individual_omics_qc_passed == true"
    severity: "block"
    on_fail: "某个组学层 QC 不通过 → 该层的噪声会在整合分析中传播到其他层，降低整体分析可靠性。Garbage in, garbage out。"
  - id: "multi-integration-method"
    rule: "整合方法的选择应基于生物学问题（相关性/预测/网络/因果推断）"
    check: "integration_method_specified == true"
    severity: "warn"
    on_fail: "整合方法选择不当 → 可能产生误导性结论。相关性方法（稀疏 CCA）适合探索性分析；网络方法（WGCNA 跨层）适合模块发现；因果推断（中介分析）需要特定的实验设计。"
