name: hybrid-prediction
description: "Plant hybrid prediction — GCA/SCA estimation, heterotic group classification, genomic prediction of unobserved crosses, and optimal mate selection. Covers NCII and diallel designs, genomic BLUP, BayesR, and breeding constraints. Dual-mode B+C decision system."
triggers:
  - "hybrid"
  - "heterosis"
  - "combining ability"
  - "gca"
  - "sca"
  - "hybrid breeding"
  - "testcross"
  - "diallel"

inputs:
  - data_profile.json
  - params.yaml
  - phenotype_data
  - genotype_data
  - pedigree (optional)

outputs:
  - gca_sca_table
  - heterotic_groups
  - cross_prediction_table
  - mate_selection_table
  - analysis_report

version: "1.0"
analysis: hybrid_prediction

inputs_required:
  - data_profile.json
  - params.yaml
  - phenotype_data
  - genotype_data
  - pedigree (optional)

# ============================================================
# Decision Node 1: GCA/SCA Estimation
# ============================================================
gca_sca:
  - rule_id: "hyb-gca-nc2-001"
    priority: 10
    condition:
      design: ["nc2", "diallel"]
    recommend: "gca_sca_nc2"
    reason: "NCII/双列杂交 → GCA+SCA估计"
    tool_id: "gca-sca"

  - rule_id: "hyb-gca-factorial-002"
    priority: 9
    condition:
      design: "factorial"
    recommend: "gca_sca_factorial"
    reason: "因子设计 → 部分双列杂交GCA估计"

  - rule_id: "hyb-gca-pedigree-003"
    priority: 8
    condition:
      has_pedigree: true
    recommend: "blup_pedigree"
    reason: "有系谱 → BLUP育种值估计"

# ============================================================
# Decision Node 2: Heterotic Group Classification
# ============================================================
heterotic_group:
  - rule_id: "hyb-heterotic-genomic-001"
    priority: 5
    recommend: "genomic_heterotic_grouping"
    reason: "基因组数据 → 分子标记划分杂优群"
    tool_id: "heterotic-group"

  - rule_id: "hyb-heterotic-pedigree-002"
    priority: 6
    condition:
      has_pedigree: true
    recommend: "pedigree_based_grouping"
    reason: "系谱数据 → 系谱聚类划分杂优群"

  - rule_id: "hyb-heterotic-phenotype-003"
    priority: 7
    condition:
      has_phenotype: true
      has_genotype: false
    recommend: "phenotype_based_grouping"
    reason: "仅有表型 → 基于配合力划分杂优群"

# ============================================================
# Decision Node 3: Cross Prediction
# ============================================================
cross_prediction:
  - rule_id: "hyb-genomic-prediction-001"
    priority: 10
    condition:
      has_genotype: true
    recommend: "genomic_best_linear_prediction"
    reason: "有基因型 → 基因组预测未测杂交组合"
    tool_id: "cross-prediction"

  - rule_id: "hyb-gca-based-prediction-002"
    priority: 8
    condition:
      has_genotype: false
    recommend: "gca_based_prediction"
    reason: "无基因型 → 基于GCA预测杂交表现"

  - rule_id: "hyb-bayesian-prediction-003"
    priority: 11
    condition:
      marker_count: ">= 50000"
      prefer_bayesian: true
    recommend: "bayes_rrblup"
    reason: "高密度标记 → BayesR/BayesB考虑标记效应异质性"

# ============================================================
# Decision Node 4: Mate Selection
# ============================================================
mate_selection:
  - rule_id: "hyb-mate-selection-001"
    priority: 5
    recommend: "optimal_contribution_with_constraints"
    reason: "最优贡献选择+育种约束"
    tool_id: "mate-selection"

  - rule_id: "hyb-mate-genetic-gain-002"
    priority: 6
    condition:
      objective: "genetic_gain"
    recommend: "truncation_selection_with_inbreeding_control"
    reason: "遗传增益最大化 → 截断选择+近交控制"

# ============================================================
# Decision Node 5: Visualization
# ============================================================
visualization:
  - rule_id: "hyb-vis-heterotic-001"
    priority: 5
    recommend: "heterotic_group_plot"
    reason: "杂优群PCA+MDS可视化"
    tool_id: "visualization"

  - rule_id: "hyb-vis-cross-prediction-002"
    priority: 6
    condition:
      has_prediction_result: true
    recommend: "prediction_accuracy_scatter"
    reason: "预测准确性散点图"

# ============================================================
# Fallback
# ============================================================
fallback:
  - rule_id: "hyb-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"

design_gates:
  - id: "hybrid-training-population"
    rule: "杂种预测需要训练群体（包含杂种及其亲本的表型和基因型数据）"
    check: "has_training_population == true"
    severity: "block"
    on_fail: "没有训练群体 → 无法建立杂种表现预测模型。需要至少一组已经做了杂交和表型鉴定的训练数据来训练模型。"
  - id: "hybrid-parental-genotypes"
    rule: "需要亲本的基因型数据以预测杂种的基因型"
    check: "has_parental_genotypes == true"
    severity: "block"
    on_fail: "没有亲本基因型 → 无法推演杂种的基因型组合。杂种预测的核心是从亲本基因型推断可能的杂种等位基因构成。"
  - id: "hybrid-training-size"
    rule: "训练群体中的杂种数量至少 50 个才能获得基本的预测准确性"
    check: "hybrid_count >= 50"
    severity: "warn"
    on_fail: "训练杂种数 < 50 → 预测准确性可能很低。杂种预测的准确性同时受训练群体大小和杂种间遗传关系影响。增加训练杂种的数量或使用基因组最佳线性无偏预测 (GBLUP) 来利用亲缘关系信息。"
