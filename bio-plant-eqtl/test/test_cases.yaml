# eQTL test cases
# 10 cases covering all decision-matrix sections

test_cases:
  # --- eqtl_type ---
  - name: "cis_eqtl_standard"
    rule_section: eqtl_type
    input_profile:
      distance_focus: "cis"
    expected:
      rule_id: "eqtl-cis-standard-001"
      recommend: "cis_eqtl_matrixeqtl"

  - name: "trans_eqtl_large_sample"
    rule_section: eqtl_type
    input_profile:
      distance_focus: "trans"
      sample_count: "250"
    expected:
      rule_id: "eqtl-trans-002"
      recommend: "trans_eqtl_matrixeqtl"

  - name: "trans_eqtl_small_sample_fallback"
    rule_section: eqtl_type
    input_profile:
      distance_focus: "trans"
      sample_count: "100"
    expected:
      rule_id: "eqtl-fallback-999"
      action: "delegate_to_expert"

  # --- multiple_testing ---
  - name: "million_tests_permutation_fdr"
    rule_section: multiple_testing
    input_profile:
      test_count: "2000000"
    expected:
      rule_id: "eqtl-fdr-001"
      action: "fdr_0.05_with_permutation"

  - name: "few_tests_no_permutation_fallback"
    rule_section: multiple_testing
    input_profile:
      test_count: "500"
    expected:
      rule_id: "eqtl-fallback-999"
      action: "delegate_to_expert"

  # --- colocalization ---
  - name: "has_gwas_coloc_analysis"
    rule_section: colocalization
    input_profile:
      has_gwas_results: true
    expected:
      rule_id: "eqtl-coloc-gwas-001"
      recommend: "coloc_analysis"

  - name: "no_gwas_skip_coloc_fallback"
    rule_section: colocalization
    input_profile:
      has_gwas_results: false
    expected:
      rule_id: "eqtl-fallback-999"
      action: "delegate_to_expert"

  # --- multi_tissue ---
  - name: "multi_tissue_three_organs"
    rule_section: multi_tissue
    input_profile:
      tissue_count: "3"
    expected:
      rule_id: "eqtl-multi-tissue-001"
      recommend: "tissue_specific_vs_shared_eqtl"

  - name: "single_tissue_fallback"
    rule_section: multi_tissue
    input_profile:
      tissue_count: "1"
    expected:
      rule_id: "eqtl-fallback-999"
      action: "delegate_to_expert"

  # --- explicit fallback section ---
  - name: "explicit_fallback_none_matched"
    rule_section: fallback
    input_profile:
      nothing_matches: "true"
    expected:
      rule_id: "eqtl-fallback-999"
      action: "delegate_to_expert"
