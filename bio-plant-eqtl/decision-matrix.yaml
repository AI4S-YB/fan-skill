version: "1.0"
analysis: eqtl_analysis

eqtl_type:
  - rule_id: "eqtl-cis-standard-001"
    priority: 10
    condition:
      distance_focus: "cis"
    recommend: "cis_eqtl_matrixeqtl"
    reason: "cis-eQTL ±1Mb → MatrixEQTL线性模型"
    tool: "tool-catalog/cis-trans.md"
  - rule_id: "eqtl-trans-002"
    priority: 9
    condition:
      distance_focus: "trans"
      sample_count: ">= 200"
    recommend: "trans_eqtl_matrixeqtl"
    reason: "trans-eQTL需要大样本量"
    tool: "tool-catalog/cis-trans.md"

multiple_testing:
  - rule_id: "eqtl-fdr-001"
    priority: 5
    condition:
      test_count: ">= 1000000"
    action: "fdr_0.05_with_permutation"
    reason: "百万级检验 → FDR+置换双重校正"

colocalization:
  - rule_id: "eqtl-coloc-gwas-001"
    priority: 5
    condition:
      has_gwas_results: true
    recommend: "coloc_analysis"
    reason: "有GWAS结果 → coloc共定位分析"
    tool: "tool-catalog/colocalization.md"

multi_tissue:
  - rule_id: "eqtl-multi-tissue-001"
    priority: 5
    condition:
      tissue_count: ">= 2"
    recommend: "tissue_specific_vs_shared_eqtl"
    reason: "多组织 → 区分组织特异性和共享eQTL"
    tool: "tool-catalog/multi-tissue.md"

fallback:
  - rule_id: "eqtl-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
