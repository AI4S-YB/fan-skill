test_cases:
  - name: "standard_counts_matrix"
    rule_section: count_matrix_format
    input_profile:
      format_hint: "genes.counts.matrix"
    expected:
      rule_id: "fmt-counts-matrix-001"

  - name: "salmon_quant_import"
    rule_section: count_matrix_format
    input_profile:
      format_hint: "salmon_quant"
    expected:
      rule_id: "fmt-salmon-003"

  - name: "standard_filter_9plus_samples"
    rule_section: low_expression_filter
    input_profile:
      sample_count: 15
    expected:
      rule_id: "filter-standard-001"

  - name: "small_n_filter"
    rule_section: low_expression_filter
    input_profile:
      sample_count: 6
    expected:
      rule_id: "filter-small-n-002"

  - name: "standard_deseq2"
    rule_section: de_method
    input_profile:
      replicates_per_group: 3
      design_type: "two_group"
    expected:
      rule_id: "de-standard-deseq2-001"

  - name: "two_replicates_deseq2"
    rule_section: de_method
    input_profile:
      replicates_per_group: 2
    expected:
      rule_id: "de-low-reps-deseq2-002"

  - name: "no_replicates_edger"
    rule_section: de_method
    input_profile:
      replicates_per_group: 1
    expected:
      rule_id: "de-no-reps-edger-003"

  - name: "continuous_covariate_limma"
    rule_section: de_method
    input_profile:
      design_type: "continuous"
    expected:
      rule_id: "de-continuous-covariate-004"

  - name: "large_dataset_limma"
    rule_section: de_method
    input_profile:
      gene_count: 50000
      sample_count: 40
    expected:
      rule_id: "de-large-dataset-005"

  - name: "standard_bh_correction"
    rule_section: multiple_testing
    input_profile:
      method: "deseq2"
    expected:
      rule_id: "mt-standard-001"

  - name: "plant_reactome_enrichment"
    rule_section: enrichment_database
    input_profile:
      species_detected: "oryza_sativa"
    expected:
      rule_id: "enrich-plant-reactome-001"

  - name: "mercator_for_unknown_species"
    rule_section: enrichment_database
    input_profile:
      species_detected: "unknown"
    expected:
      rule_id: "enrich-mercator-002"

  - name: "standard_wgcna_small"
    rule_section: wgcna
    input_profile:
      gene_count: 8000
    expected:
      rule_id: "wgcna-standard-001"

  - name: "blockwise_wgcna_large"
    rule_section: wgcna
    input_profile:
      gene_count: 15000
    expected:
      rule_id: "wgcna-large-002"
