# QC 阈值 — 各分析类型的质量标准
# 每个分析 Skill 引用此文件中的对应 section

gwas:
  genotype_qc:
    sample_call_rate:
      threshold: 0.90
      description: "样本检出率 > 90%"
    variant_call_rate:
      threshold: 0.90
      description: "位点检出率 > 90%"
    maf:
      threshold: 0.05
      description: "最小等位基因频率 > 5%"
      relaxed: 0.01
      relaxed_note: "标记数 < 10000 时可放宽至 1%"
    hwe:
      threshold: 1e-6
      description: "Hardy-Weinberg 平衡 P 值"
      note: "自交作物可放宽或跳过"

  population_structure:
    genomic_inflation_lambda:
      ideal: [0.95, 1.05]
      warn: [1.05, 1.2]
      fail: 1.2
      note: "自交作物 warn 范围可放宽到 [1.05, 1.3]"
    pc1_variance:
      min: 0.05
      note: "PC1 < 5% 指示无明显群体结构"

  association:
    significant_snps:
      threshold: "bonferroni_5e-8"
      relaxed: "bonferroni_0.05_by_snp_count"
      note: "标记数 < 10000 时使用宽松阈值"
    lambda_acceptable:
      ideal: [0.95, 1.05]
      note: "λ=1.0 理想；λ>1.05 加协变量；λ>2.0 严重分层"

population_genetics:
  pca:
    pc1_3_cumulative:
      informative: 0.15
      strong_structure: 0.30
    sample_outlier_sd: 6
  admixture:
    cv_error_convergence: "delta < 0.01 across last 3 K values"
  fst:
    significant_differentiation: 0.15
    moderate_differentiation: 0.05

rnaseq:
  mapping:
    alignment_rate:
      threshold: 0.70
      description: "Read alignment rate > 70%"
  quantification:
    genes_detected_min:
      threshold: 10000
      description: "Minimum genes with >= 10 counts"
  differential_expression:
    padj_threshold:
      threshold: 0.05
      description: "Adjusted p-value for significance"
    log2fc_threshold:
      threshold: 1.0
      description: "Absolute log2 fold change for biological significance"
    deg_min_per_contrast:
      threshold: 5
      description: "Minimum DEGs expected per contrast"
      note: "<5 DEGs may indicate low power or genuinely subtle differences"
  enrichment:
    min_category_size:
      threshold: 5
      description: "Minimum genes in a category for testing"
    padj_threshold:
      threshold: 0.05
  wgcna:
    scale_free_topology_r2:
      threshold: 0.80
      description: "Scale-free topology model fit R² > 0.80 for soft threshold selection"
    min_module_size:
      threshold: 30
      description: "Minimum genes per module"

genomic_selection:
  prediction_accuracy:
    pearson_r_min:
      threshold: 0.30
      description: "Minimum prediction accuracy (Pearson r) — below this, GS may not be practical"
    pearson_r_good:
      threshold: 0.50
      description: "Good prediction accuracy"
  cross_validation:
    folds_min:
      threshold: 5
      description: "Minimum CV folds for reliable accuracy estimation"
    repeats_min:
      threshold: 5
      description: "Minimum CV repeats for small populations (<500)"
  heritability:
    min_for_gs:
      threshold: 0.10
      description: "Minimum trait heritability for GS to be worthwhile"
  marker_density:
    min_for_gblup:
      threshold: 1000
      description: "Minimum markers for GBLUP"
    min_for_bayes:
      threshold: 5000
      description: "Minimum markers for BayesB/BayesC (variable selection benefits from density)"

phenotype:
  heritability:
    min_for_gs: 0.10
    min_for_gwas: 0.20
    description: "H² < 0.1 → GS accuracy theoretical max ≈ 0.32"
  blup_reliability:
    threshold: 0.30
    description: "BLUP reliability (r²) > 0.30 for selection decisions"
  spatial_variation:
    cv_threshold: 0.15
    description: "Field CV > 15% → consider spatial correction"

variant_calling:
  alignment:
    mapping_rate_min: 0.90
    description: "Read mapping rate > 90%"
  variant_quality:
    gq_min: 30
    description: "Genotype quality (GQ) ≥ 30"
    dp_min: 5
    description: "Minimum depth (DP) ≥ 5"
  calling:
    ti_tv_ratio: [2.0, 2.5]
    description: "Ti/Tv ratio ~2.0-2.5 for plants (higher than human)"

genotype_imputation:
  pre_imputation:
    maf_min: 0.01
    geno_max: 0.10
  post_imputation:
    r2_min: 0.30
    description: "IMPUTE2 info score / Beagle R² > 0.30 for inclusion"
    accuracy_min: 0.80
    description: "Imputation accuracy > 80% for well-imputed variants"

qtl_mapping:
  population:
    size_min: 100
    description: "Biparental population ≥ 100 individuals for QTL detection"
  genetic_map:
    marker_count_min: 100
    description: "≥ 100 markers for genetic map construction"
  lod:
    threshold_permutation: true
    description: "Use permutation-based LOD threshold (n≥1000 permutations)"
