# QC 阈值 — 各分析类型的质量标准
# 每个分析 Skill 引用此文件中的对应 section

gwas:
  genotype_qc:
    sample_call_rate:
      threshold: 0.90
      description: "样本检出率 > 90%"
    variant_call_rate:
      threshold: 0.90
      description: "位点检出率 > 90%"
    maf:
      threshold: 0.05
      description: "最小等位基因频率 > 5%"
      relaxed: 0.01
      relaxed_note: "标记数 < 10000 时可放宽至 1%"
    hwe:
      threshold: 1e-6
      description: "Hardy-Weinberg 平衡 P 值"
      note: "自交作物可放宽或跳过"

  population_structure:
    genomic_inflation_lambda:
      ideal: [0.95, 1.05]
      warn: [1.05, 1.2]
      fail: 1.2
      note: "自交作物 warn 范围可放宽到 [1.05, 1.3]"
    pc1_variance:
      min: 0.05
      note: "PC1 < 5% 指示无明显群体结构"

  association:
    significant_snps:
      threshold: "bonferroni_5e-8"
      relaxed: "bonferroni_0.05_by_snp_count"
      note: "标记数 < 10000 时使用宽松阈值"
    lambda_acceptable:
      ideal: [0.95, 1.05]
      note: "λ=1.0 理想；λ>1.05 加协变量；λ>2.0 严重分层"

population_genetics:
  pca:
    pc1_3_cumulative:
      informative: 0.15
      strong_structure: 0.30
    sample_outlier_sd: 6
  admixture:
    cv_error_convergence: "delta < 0.01 across last 3 K values"
  fst:
    significant_differentiation: 0.15
    moderate_differentiation: 0.05

rnaseq:
  mapping:
    alignment_rate:
      threshold: 0.70
      description: "Read alignment rate > 70%"
  quantification:
    genes_detected_min:
      threshold: 10000
      description: "Minimum genes with >= 10 counts"
  differential_expression:
    padj_threshold:
      threshold: 0.05
      description: "Adjusted p-value for significance"
    log2fc_threshold:
      threshold: 1.0
      description: "Absolute log2 fold change for biological significance"
    deg_min_per_contrast:
      threshold: 5
      description: "Minimum DEGs expected per contrast"
      note: "<5 DEGs may indicate low power or genuinely subtle differences"
  enrichment:
    min_category_size:
      threshold: 5
      description: "Minimum genes in a category for testing"
    padj_threshold:
      threshold: 0.05
  wgcna:
    scale_free_topology_r2:
      threshold: 0.80
      description: "Scale-free topology model fit R² > 0.80 for soft threshold selection"
    min_module_size:
      threshold: 30
      description: "Minimum genes per module"

genomic_selection:
  prediction_accuracy:
    pearson_r_min:
      threshold: 0.30
      description: "Minimum prediction accuracy (Pearson r) — below this, GS may not be practical"
    pearson_r_good:
      threshold: 0.50
      description: "Good prediction accuracy"
  cross_validation:
    folds_min:
      threshold: 5
      description: "Minimum CV folds for reliable accuracy estimation"
    repeats_min:
      threshold: 5
      description: "Minimum CV repeats for small populations (<500)"
  heritability:
    min_for_gs:
      threshold: 0.10
      description: "Minimum trait heritability for GS to be worthwhile"
  marker_density:
    min_for_gblup:
      threshold: 1000
      description: "Minimum markers for GBLUP"
    min_for_bayes:
      threshold: 5000
      description: "Minimum markers for BayesB/BayesC (variable selection benefits from density)"

phenotype:
  heritability:
    min_for_gs: 0.10
    min_for_gwas: 0.20
    description: "H² < 0.1 → GS accuracy theoretical max ≈ 0.32"
  blup_reliability:
    threshold: 0.30
    description: "BLUP reliability (r²) > 0.30 for selection decisions"
  spatial_variation:
    cv_threshold: 0.15
    description: "Field CV > 15% → consider spatial correction"

variant_calling:
  alignment:
    mapping_rate_min: 0.90
    description: "Read mapping rate > 90%"
  variant_quality:
    gq_min: 30
    description: "Genotype quality (GQ) ≥ 30"
    dp_min: 5
    description: "Minimum depth (DP) ≥ 5"
  calling:
    ti_tv_ratio: [2.0, 2.5]
    description: "Ti/Tv ratio ~2.0-2.5 for plants (higher than human)"

genotype_imputation:
  pre_imputation:
    maf_min: 0.01
    geno_max: 0.10
  post_imputation:
    r2_min: 0.30
    description: "IMPUTE2 info score / Beagle R² > 0.30 for inclusion"
    accuracy_min: 0.80
    description: "Imputation accuracy > 80% for well-imputed variants"

qtl_mapping:
  population:
    size_min: 100
    description: "Biparental population ≥ 100 individuals for QTL detection"
  genetic_map:
    marker_count_min: 100
    description: "≥ 100 markers for genetic map construction"
  lod:
    threshold_permutation: true
    description: "Use permutation-based LOD threshold (n≥1000 permutations)"

time_series:
  clustering:
    min_genes_for_clustering: 1000
    description: "At least 1000 variable genes for meaningful clustering"
  mfuzz:
    fuzzifier_m_range: [1.5, 2.5]
    description: "Fuzzifier m typically 1.5-2.5; higher = softer clustering"

grn:
  genie3:
    min_samples: 15
    description: "≥15 samples for GENIE3 network inference"
  scenic:
    min_regulons: 10
    description: "≥10 regulons detected for meaningful analysis"

multi_omics:
  mofa:
    min_samples: 15
    min_features_per_view: 100
  diablo:
    min_samples_per_class: 5

eqtl:
  cis:
    distance_bp: 1000000
    description: "cis-eQTL window ±1Mb from gene TSS"
  fdr:
    threshold: 0.05
    description: "FDR < 0.05 for eQTL significance"

enviromics:
  gxe:
    min_env: 3
    description: "≥3 environments for reliable G×E variance component estimation"
  tpe:
    min_env_for_definition: 5
    description: "≥5 environments for TPE characterization"

small_rna:
  mirna_prediction:
    min_reads: 10
    description: "≥10 reads for miRNA detection"
  target_prediction:
    max_expectation: 3.0
    description: "psRNATarget expectation ≤ 3.0"

chipseq:
  peak_calling:
    q_value: 0.05
    description: "MACS2 q-value < 0.05"
  frip:
    min_frip: 0.01
    description: "FRiP (Fraction of Reads in Peaks) > 1%"

atacseq:
  peak_calling:
    q_value: 0.05
  tss_enrichment:
    min_score: 5
    description: "TSS enrichment score ≥ 5"

methylation:
  coverage:
    min_depth: 5
    description: "Per-CpG coverage ≥ 5x"
  dmr:
    min_difference: 0.20
    description: "DMR methylation difference ≥ 20%"

genome_assembly:
  busco:
    complete_min: 0.80
    description: "BUSCO completeness ≥ 80%"
  contig_n50:
    description: "N50 depends on technology — PacBio HiFi > 5Mb, ONT > 1Mb, Illumina > 10kb"

genome_annotation:
  busco:
    complete_min: 0.80
    description: "BUSCO of annotated proteins ≥ 80%"

amplicon:
  asv:
    min_frequency: 0.0001
    description: "ASV relative abundance ≥ 0.01%"
  rarefaction:
    min_depth: 5000
    description: "Rarefaction depth ≥ 5000 reads per sample"

metabolomics:
  peak_detection:
    snr_min: 3
    description: "S/N ratio ≥ 3 for peak detection"
  missing_values:
    max_pct: 0.50
    description: "≤ 50% missing across samples"

pan_genome:
  core_detection:
    min_genomes: 5
    description: "≥5 genomes for meaningful core/variable analysis"

metagenomics:
  binning:
    completeness_min: 0.50
    contamination_max: 0.10
    description: "MAG: completeness ≥ 50%, contamination ≤ 10%"

proteomics:
  protein_fdr:
    threshold: 0.01
    description: "Protein-level FDR < 1%"

hybrid_prediction:
  gca_accuracy:
    min_correlation: 0.50
    description: "GCA prediction accuracy r > 0.50 for practical use"

crispr:
  off_target:
    max_mismatches: 3
    description: "≤3 mismatches in seed region for acceptable specificity"
