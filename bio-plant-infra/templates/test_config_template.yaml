# test_config_template.yaml
# 测试配置 — 换服务器时只需要修改此文件

data_sources:
  genotype_dir: "/path/to/genotype/data"
  phenotype_dir: "/path/to/phenotype/data"
  reference_dir: "/path/to/reference/genomes"
  database_dir: "/path/to/databases"

tool_provider:
  # 优先级: pixi > conda > singularity > docker > system
  singularity_image: "/path/to/container.sif"   # 如果用 singularity
  conda_env: "plant-bioinfo"                     # 如果用 conda

qc_thresholds:
  sample_call_rate: 0.90
  variant_call_rate: 0.90
  maf_min: 0.05
  lambda_acceptable_max: 1.1

expected_outputs:
  - "outputs/figures/manhattan.pdf"
  - "outputs/tables/significant_snps.csv"
  - "outputs/gwas_report.md"
