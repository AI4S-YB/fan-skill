version: "1.0"
analysis: population_genetics

inputs_required:
  - data_profile.json
  - params.yaml

# LD pruning strategy
ld_pruning:
  - rule_id: "ld-standard-001"
    priority: 5
    condition:
      snp_count: ">= 10000"
    action: "standard_ld_prune"
    params: {window: 50, step: 5, r2: 0.2}
    reason: "标准 LD pruning 参数"

  - rule_id: "ld-relaxed-002"
    priority: 5
    condition:
      snp_count: "< 10000"
    action: "relaxed_ld_prune"
    params: {window: 50, step: 10, r2: 0.5}
    reason: "标记少时放宽 r² 阈值，保留更多 SNP"

# K range selection for ADMIXTURE
k_range:
  - rule_id: "k-large-dataset-001"
    priority: 5
    condition:
      sample_count: ">= 100"
    recommend: "K=1 to 15"
    reason: "大样本可能需要更多祖先成分"

  - rule_id: "k-small-dataset-002"
    priority: 5
    condition:
      sample_count: "< 100"
    recommend: "K=1 to 8"
    reason: "小样本限定 K 上限避免过拟合"

# Population structure interpretation
structure_interpretation:
  - rule_id: "struct-strong-001"
    priority: 5
    condition:
      pc1_variance: ">= 0.15"
    interpretation: "strong_discrete_structure"
    reason: "PC1 > 15% → 明显的离散亚群"

  - rule_id: "struct-moderate-002"
    priority: 5
    condition:
      pc1_variance: ">= 0.05"
    interpretation: "moderate_structure"
    reason: "PC1 5-15% → 适度的群体结构"

  - rule_id: "struct-weak-003"
    priority: 5
    condition:
      pc1_variance: "< 0.05"
    interpretation: "weak_continuous_structure"
    reason: "PC1 < 5% → 无明显群体分化或沿连续梯度分布"

  - rule_id: "struct-polyploid-004"
    priority: 6
    condition:
      ploidy: ["allopolyploid", "autopolyploid"]
    interpretation: "caution_polyploid"
    reason: "多倍体物种的 PCA 解释需谨慎"

# Fst interpretation
fst_interpretation:
  - rule_id: "fst-very-great-001"
    priority: 5
    condition:
      fst_value: ">= 0.25"
    interpretation: "very_great_differentiation"

  - rule_id: "fst-great-002"
    priority: 5
    condition:
      fst_value: ">= 0.15"
    interpretation: "great_differentiation"

  - rule_id: "fst-moderate-003"
    priority: 5
    condition:
      fst_value: ">= 0.05"
    interpretation: "moderate_differentiation"

  - rule_id: "fst-low-004"
    priority: 5
    condition:
      fst_value: "< 0.05"
    interpretation: "low_differentiation"

# Fallback
fallback:
  - rule_id: "popgen-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
