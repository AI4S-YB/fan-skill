# 代谢组学 决策矩阵测试用例
# 每条 rule 至少一个 case 能触发

test_cases:
  # --- 峰检测：LC-MS ---
  - name: "peak_detection_lc_ms_xcms"
    rule_section: peak_detection
    input_profile:
      platform: "lc_ms"
    expected:
      rule_id: "metab-xcms-lc-001"
      recommend: "xcms"

  - name: "peak_detection_lc_ms_qtof"
    rule_section: peak_detection
    input_profile:
      platform: "lc_ms"
    expected:
      rule_id: "metab-xcms-lc-001"
      recommend: "xcms"

  # --- 峰检测：GC-MS ---
  - name: "peak_detection_gc_ms_mzmine"
    rule_section: peak_detection
    input_profile:
      platform: "gc_ms"
    expected:
      rule_id: "metab-mzmine-gc-002"
      recommend: "mzmine"

  - name: "peak_detection_gc_ms_volatiles"
    rule_section: peak_detection
    input_profile:
      platform: "gc_ms"
    expected:
      rule_id: "metab-mzmine-gc-002"
      recommend: "mzmine"

  # --- 差异分析 ---
  - name: "diff_analysis_limma_three_reps"
    rule_section: diff_analysis
    input_profile:
      rep_count: 3
    expected:
      rule_id: "metab-limma-001"
      recommend: "limma_diff_metabolites"

  - name: "diff_analysis_limma_six_reps"
    rule_section: diff_analysis
    input_profile:
      rep_count: 6
    expected:
      rule_id: "metab-limma-001"
      recommend: "limma_diff_metabolites"

  # --- 通路映射 ---
  - name: "pathway_mapping_default"
    rule_section: pathway_mapping
    input_profile: {}
    expected:
      rule_id: "metab-plantcyc-001"
      recommend: "plantcyc_and_kegg_plant"

  - name: "pathway_mapping_polyploid"
    rule_section: pathway_mapping
    input_profile:
      genome_size: "large"
    expected:
      rule_id: "metab-plantcyc-001"
      recommend: "plantcyc_and_kegg_plant"

  # --- MS/MS 注释 ---
  - name: "annotation_with_ms2"
    rule_section: annotation
    input_profile:
      has_ms2: true
    expected:
      rule_id: "metab-ms2-sirius-001"
      recommend: "sirius_csi_fingerid"

  # --- fallback ---
  - name: "no_platform_match_fallback"
    rule_section: peak_detection
    input_profile:
      platform: "nmr"
    expected:
      rule_id: "metab-fallback-999"
      action: "delegate_to_expert"
