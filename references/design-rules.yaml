## 通用门禁

以下门禁适用于所有涉及统计推断的分析类型（位于各 `rules.yaml` 中或通过框架自动检查）：

- **生物学重复**: 任何统计推断都需要生物学重复
- **对照组**: 差异分析必须有对照组
- **数值型表型**: GWAS/GS 需要数值型表型

## 新增分析类型

新增分析类型时，只需在该条目的 `rules.yaml` 中添加 `design_gates` 部分并在此处添加一行索引。无需修改任何其他文件。
