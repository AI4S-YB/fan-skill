# 实验设计硬约束

**注意**: 设计门禁 (design_gates) 现已按分析类型分散到各知识条目的 `rules.yaml` 中。

## 如何使用

当 Agent 进入某个分析类型的方法选择阶段时，应在该分析类型的 `rules.yaml` 中查找 `design_gates` 部分。每个 gate 包含：
- `id`: 门禁唯一标识
- `rule`: 人类可读的规则描述
- `check`: 可编程的检查条件
- `severity`: `block`（阻止分析）或 `warn`（警告但允许继续）
- `on_fail`: 检查失败时向用户解释的消息

