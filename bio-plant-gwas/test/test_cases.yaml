# GWAS 决策矩阵测试用例
# 每条 rule 至少一个 case 能触发

test_cases:
  # --- 格式转换 ---
  - name: "bed_format_skip_conversion"
    rule_section: data_conversion
    input_profile:
      format: "bed"
    expected:
      rule_id: "fmt-bed-001"
      action: "skip_conversion"

  - name: "vcf_format_convert"
    rule_section: data_conversion
    input_profile:
      format: "vcf"
    expected:
      rule_id: "fmt-vcf-002"
      action: "plink_make_bed"

  # --- QC 策略 ---
  - name: "high_density_standard_qc"
    rule_section: qc_strategy
    input_profile:
      snp_count: 50000
    expected:
      rule_id: "qc-standard-001"

  - name: "low_density_relaxed_qc"
    rule_section: qc_strategy
    input_profile:
      snp_count: 5000
    expected:
      rule_id: "qc-relaxed-002"

  - name: "inbred_skip_hwe"
    rule_section: qc_strategy
    input_profile:
      species_type: "inbred"
    expected:
      rule_id: "qc-inbred-003"

  # --- GWAS 方法选择 ---
  - name: "large_high_density_low_lambda"
    rule_section: gwas_method
    input_profile:
      sample_count: 1200
      snp_count: 80000
      genomic_inflation: 1.02
    expected:
      rule_id: "gwas-large-bl-001"
      recommend: "blink"

  - name: "stratified_medium_density"
    rule_section: gwas_method
    input_profile:
      genomic_inflation: 1.8
      sample_count: 300
      snp_count: 30000
    expected:
      rule_id: "gwas-stratified-fc-002"
      recommend: "farmcpu"

  - name: "small_inbred"
    rule_section: gwas_method
    input_profile:
      sample_count: 150
      species_type: "inbred"
    expected:
      rule_id: "gwas-small-inbred-cmlm-003"
      recommend: "gapit-cmlm"

  - name: "small_outcross"
    rule_section: gwas_method
    input_profile:
      sample_count: 100
      species_type: "outcross"
    expected:
      rule_id: "gwas-small-outcross-cmlm-004"
      recommend: "gapit-cmlm"

  - name: "multi_environment"
    rule_section: gwas_method
    input_profile:
      env_count: 3
    expected:
      rule_id: "gwas-multienv-met-005"
      recommend: "met-gwas"

  - name: "autotetraploid"
    rule_section: gwas_method
    input_profile:
      ploidy: "autotetraploid"
    expected:
      rule_id: "gwas-tetraploid-006"
      recommend: "gwaspoly"

  - name: "no_rule_matches"
    rule_section: gwas_method
    input_profile:
      sample_count: 50
      snp_count: 500
      genomic_inflation: 5.0
      species_type: "unknown"
      ploidy: "hexaploid"
    expected:
      rule_id: "gwas-fallback-999"
      action: "delegate_to_expert"

  # --- 协变量策略 ---
  - name: "outcross_low_stratification_pca"
    rule_section: covariate_strategy
    input_profile:
      species_type: "outcross"
      genomic_inflation: 1.03
    expected:
      rule_id: "cov-pc-only-001"

  - name: "inbred_small_k_matrix"
    rule_section: covariate_strategy
    input_profile:
      species_type: "inbred"
      sample_count: 150
    expected:
      rule_id: "cov-k-only-002"

  - name: "high_stratification_pc_plus_k"
    rule_section: covariate_strategy
    input_profile:
      genomic_inflation: 1.5
    expected:
      rule_id: "cov-pc-plus-k-003"

  - name: "allopolyploid_subgenome"
    rule_section: covariate_strategy
    input_profile:
      ploidy: "allopolyploid"
    expected:
      rule_id: "cov-subgenome-004"

  # --- 显著性阈值 ---
  - name: "standard_bonferroni"
    rule_section: significance_threshold
    input_profile:
      method: "blink"
    expected:
      threshold: "5e-8"

  - name: "relaxed_bonferroni_low_snp"
    rule_section: significance_threshold
    input_profile:
      snp_count: 5000
    expected:
      rule_id: "sig-bonferroni-relaxed-002"
