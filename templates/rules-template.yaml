<first_decision_node>:
  - rule_id: "<name>-standard-001"
    priority: 10
    condition:
      <field>: "<value>"
    recommend: "<method>"
    reason: "<why>"
    tool_id: "<tool-name>"

  - rule_id: "<name>-fallback-999"
    priority: 0
    condition: "none_matched"
    action: "delegate_to_expert"
